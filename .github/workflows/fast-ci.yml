name: fast-ci

on:
  pull_request:
  push:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fast-quality-gates:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run lint
        run: ruff check .

      - name: Check patch whitespace
        run: git diff --check

      - name: Run safety scans
        run: python scripts/run_ci_safety_scans.py

      - name: Run critical contract subset
        run: |
          env -u FRED_API_KEY python -m pytest \
            tests/test_qa0_integrity_audit.py \
            tests/test_qa1e_strict_scoring.py \
            tests/test_qa2_eligibility_semantics.py \
            tests/test_scenario_temporal_eligibility.py \
            tests/test_phase20_historical_validation_dry_run_closure.py \
            tests/test_phase19_validation_execution_readiness_closure.py \
            tests/test_show_phase12_book_core_gap_resolution_closure_script.py \
            tests/test_github_pages_workflow.py \
            tests/test_ci_workflows.py

      - name: Run QA0 integrity audit
        run: python scripts/run_qa0_integrity_audit.py
