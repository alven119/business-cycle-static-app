name: fast-ci

on:
  pull_request:
  push:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fast-quality-gates:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run lint
        run: ruff check .

      - name: Check patch whitespace
        run: git diff --check

      - name: Run safety scans
        run: python scripts/run_ci_safety_scans.py

      - name: Run critical contract subset
        run: |
          env -u FRED_API_KEY python -m pytest \
            tests/test_ci_safety_scans.py \
            tests/test_ci_workflows.py \
            tests/test_github_pages_workflow.py \
            tests/test_test_suite_reduction_plan.py \
            tests/test_archive_regression_shards.py \
            tests/test_product_doctrine_enforcement.py \
            tests/test_declared_cycle_state_registry.py \
            tests/test_ordered_cycle_state_machine.py \
            tests/test_boom_transition_monitor.py \
            tests/test_indicator_dashboard_explanation_drilldown.py \
            tests/test_research_dashboard_bundle.py

      - name: Run QA0 integrity audit
        run: python scripts/run_qa0_integrity_audit.py
