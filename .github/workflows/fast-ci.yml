name: fast-ci

on:
  pull_request:
  push:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fast-quality-gates:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run lint
        run: ruff check .

      - name: Check patch whitespace
        run: git diff --check

      - name: Run safety scans
        run: python scripts/run_ci_safety_scans.py

      - name: Run critical contract subset
        run: env -u FRED_API_KEY python scripts/run_fast_ci_contract_tests.py

      - name: Run QA0 integrity audit
        run: python scripts/run_qa0_integrity_audit.py
