name: nightly-ci

on:
  workflow_dispatch:
  schedule:
    - cron: "23 10 * * *"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  nightly-archive-regression:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard:
          - legacy_v1_compatibility
          - phase_closure_history
          - historical_validation_replay
          - portfolio_policy_research
          - source_provider_cache
          - book_core_shadow_governance
          - dashboard_rendering_archive
          - infrastructure_misc_archive

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run archive regression shard without FRED API key
        run: >
          env -u FRED_API_KEY python scripts/run_archive_regression_shard.py
          --shard ${{ matrix.shard }}

      - name: Run lint
        run: ruff check .

      - name: Check patch whitespace
        run: git diff --check

      - name: Run safety scans
        run: python scripts/run_ci_safety_scans.py

  nightly-closure-regression:
    runs-on: ubuntu-latest
    needs: nightly-archive-regression

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run lint
        run: ruff check .

      - name: Check patch whitespace
        run: git diff --check

      - name: Run safety scans
        run: python scripts/run_ci_safety_scans.py

      - name: Run important closure scripts
        run: python scripts/run_ci_closure_checks.py --tier nightly
