name: Build and deploy business cycle dashboard

on:
  workflow_dispatch:
  schedule:
    - cron: "17 10 * * 1"
  push:
    branches:
      - main
      - master

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests without FRED API key
        run: env -u FRED_API_KEY python -m pytest

      - name: Run lint
        run: ruff check .

  build-dashboard:
    needs: test
    runs-on: ubuntu-latest

    env:
      FRED_API_KEY: ${{ secrets.FRED_API_KEY }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Check FRED API key is configured
        run: |
          if [ -z "${FRED_API_KEY:-}" ]; then
            echo "FRED_API_KEY secret is not configured." >&2
            exit 1
          fi

      - name: Build dashboard from live public macro data
        run: |
          python scripts/update_catalog_data.py --force-refresh
          python scripts/run_cycle_pipeline.py
          python scripts/build_site.py

      - name: Check generated dashboard output
        run: |
          test -f public/index.html
          test -f public/data/cycle_snapshot.json
          if grep -R -F -q "${FRED_API_KEY}" public; then
            echo "Generated public output contains the FRED API key." >&2
            exit 1
          fi
          git status --short --ignored public

      - name: Configure Pages
        if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build-dashboard
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
