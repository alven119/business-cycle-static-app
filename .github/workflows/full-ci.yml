name: full-ci

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  full-quality-gates:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run full pytest without FRED API key
        run: env -u FRED_API_KEY python -m pytest

      - name: Run lint
        run: ruff check .

      - name: Check patch whitespace
        run: git diff --check

      - name: Run safety scans
        run: |
          if git ls-files | grep -E '(__pycache__|\.pyc|\.pytest_cache|\.ruff_cache|\.mypy_cache|data/raw|data/backtests|data/prospective|public)'; then
            echo "Tracked generated, cache, raw, backtest, prospective, or public output file detected." >&2
            exit 1
          fi
          secret_pattern="FRED_API_KEY""="
          if grep -R "$secret_pattern" . --exclude-dir=.git --exclude-dir=.venv --exclude-dir=__pycache__ --exclude=".env"; then
            echo "Inline FRED API key assignment detected." >&2
            exit 1
          fi
          claim_pattern="book-faithful model ""complete"
          claim_pattern="${claim_pattern}|candidate phase ""ready"
          claim_pattern="${claim_pattern}|prospective monitoring ""started"
          claim_pattern="${claim_pattern}|economically ""validated"
          claim_pattern="${claim_pattern}|holdout ""active"
          claim_pattern="${claim_pattern}|production-""ready"
          claim_pattern="${claim_pattern}|real backtest ""ready"
          claim_pattern="${claim_pattern}|investment-""ready"
          if grep -RniE "$claim_pattern" README.md docs specs src scripts tests; then
            echo "Unsupported product readiness claim detected." >&2
            exit 1
          fi
          if find data/backtests data/prospective public -type f 2>/dev/null | grep -q .; then
            echo "Generated backtest, prospective, or public output detected." >&2
            exit 1
          fi
          test ! -d data/backtests/research

      - name: Run key closure scripts
        run: python scripts/run_ci_closure_checks.py --tier full
