name: full-ci

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  full-quality-gates:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run full pytest without FRED API key
        run: env -u FRED_API_KEY python -m pytest

      - name: Run lint
        run: ruff check .

      - name: Check patch whitespace
        run: git diff --check

      - name: Run safety scans
        run: python scripts/run_ci_safety_scans.py

      - name: Run key closure scripts
        run: python scripts/run_ci_closure_checks.py --tier full
