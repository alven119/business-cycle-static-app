phase_id: recovery
phase_name_zh: 復甦期
description_zh: 復甦期代表經濟從衰退後的谷底逐步修復。MVP spec 先聚焦勞動市場壓力下降、消費回溫與耐久財訂單改善，不宣稱已涵蓋所有書中指標。
indicators:
  - indicator_id: initial_jobless_claims
    weight: 0.30
    role: core
    signal_transform: as_is
    signal_note_zh: 復甦期將初領失業救濟金改善分數視為正向支持。
    direction_note_zh: 初領失業救濟金趨勢下降，通常代表裁員壓力緩和。
  - indicator_id: real_retail_sales
    weight: 0.30
    role: core
    signal_transform: as_is
    signal_note_zh: 復甦期將消費動能改善分數視為正向支持。
    direction_note_zh: 實質零售銷售改善，代表消費需求從谷底修復。
  - indicator_id: durable_goods_orders
    weight: 0.25
    role: confirmation
    signal_transform: as_is
    signal_note_zh: 復甦期將耐久財訂單落底回升分數視為正向確認。
    direction_note_zh: 耐久財新訂單落底回升，可確認需求與生產排程改善。
  - indicator_id: unemployment_rate
    weight: 0.15
    role: warning
    signal_transform: as_is
    signal_note_zh: 復甦期將失業率改善分數視為確認或風險緩和訊號。
    direction_note_zh: 失業率偏落後，不能單獨判斷復甦；若仍上升，應降低復甦信心。
minimum_available_weight: 0.70
early_mid_late_thresholds:
  early: 55.0
  mid: 70.0
  late: 82.0
confidence_policy:
  minimum_confidence: 0.60
  missing_core_indicator_penalty: 0.20
  stale_indicator_penalty: 0.10
  mixed_evidence_penalty: 0.10
transition_watch:
  next_phase: growth
  watch_threshold: 78.0
  rationale_zh: 若復甦分數較高且投資與消費確認持續，後續可觀察是否轉向成長期；這不是 current_phase 判斷。
public_explanation_zh: 復甦期 spec 用來描述哪些 indicator 會支持復甦分數。它只提供後續 phase scoring 的設定，不直接產生景氣階段結論或投資建議。
