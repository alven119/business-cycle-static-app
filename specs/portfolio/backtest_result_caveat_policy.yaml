backtest_result_caveat_policy:
  version: 1
  status: draft
  objective_zh: >
    定義 future real portfolio backtest result 必須包含的 caveat、禁止文字、安全語意與驗證規則。
    本 policy 只允許 caveat policy design，不允許產生 backtest result、績效值、allocation 或交易訊號。
  caveats_zh:
    - 此為 backtest result caveat policy，不是 backtest result。
    - 本階段不計算績效。
    - 本階段不產生 result file。
    - 本階段不寫入 data/backtests 或 public。
    - 本階段不產生 portfolio allocation。
    - 本階段不產生買賣訊號。
    - 不構成投資建議。

  source_contracts:
    backtest_result_output_contract:
      path: specs/portfolio/backtest_result_output_contract.yaml
      required: true
      required_phase_9a1_closure_status: result_contract_design_only
    backtest_metric_formula_registry:
      path: specs/portfolio/backtest_metric_formula_registry.yaml
      required: true
      required_phase_9a2_closure_status: formula_registry_design_only
    backtest_output_location_policy:
      path: specs/portfolio/backtest_output_location_policy.yaml
      required: true
      required_phase_9a3_closure_status: output_location_policy_design_only

  caveat_policy_scope:
    allowed_now:
      define_required_caveats: true
      define_display_requirements: true
      define_prohibited_text_patterns: true
      define_future_result_validation_rules: true
      define_future_acceptance_gates: true
    disallowed_now:
      produce_backtest_results: true
      compute_metric_values: true
      write_result_files: true
      write_data_backtests_output: true
      write_public_output: true
      create_output_directories: true
      produce_allocation: true
      produce_trade_signal: true
      dashboard_integration: true
      resolver_integration: true

  required_global_caveats_zh:
    - backtest-only，不是目前配置建議。
    - 回測結果不代表未來績效。
    - 本結果僅供研究與模型驗證。
    - 不構成投資建議。

  required_contextual_caveats_zh:
    revised_data:
      required: true
      text_zh: 使用修訂後歷史資料，可能與當時可取得資料不同。
    transaction_cost:
      required: true
      text_zh: 結果需明確標示交易成本與滑價假設。
    false_signal_cost:
      required: true
      text_zh: 結果需呈現錯誤訊號成本與 whipsaw 風險。
    scenario_specific:
      required: true
      text_zh: 單一歷史情境結果不得直接推論未來有效。
    covid_exogenous_shock:
      required_when_scenario: covid_recession
      text_zh: COVID 屬外生衝擊，結果不可直接推論一般景氣循環策略有效。

  display_requirements:
    required_near_result_summary: true
    required_near_metric_table: true
    required_in_export_metadata: true
    required_in_caveat_report: true
    required_language: zh
    must_be_visible_before_any_metric_value: true
    must_not_be_collapsible_only: true

  prohibited_text_patterns:
    zh:
      - 目前建議
      - 建議買進
      - 建議賣出
      - 立即買進
      - 立即賣出
      - 目標配置
      - 買進訊號
      - 賣出訊號
      - 加碼
      - 減碼
      - 保證
      - 穩賺
    en:
      - current recommendation
      - buy signal
      - sell signal
      - target weight
      - live allocation
      - rebalance now
      - guaranteed return
      - investment advice

  prohibited_result_interpretations_zh:
    - 不得將回測結果解讀為目前配置建議。
    - 不得將任何 policy template 解讀為買賣訊號。
    - 不得將 transition evidence watch 解讀為交易訊號。
    - 不得宣稱回測結果保證未來績效。
    - 不得將單一 scenario 結果直接推論為完整策略有效。

  future_result_validation_rules:
    - rule_id: required_global_caveats_present
      description_zh: 所有 result 必須包含 required_global_caveats_zh。
    - rule_id: no_prohibited_text
      description_zh: result 任一文字欄位不得包含 prohibited_text_patterns。
    - rule_id: caveats_visible_before_metrics
      description_zh: caveat 必須在任何 metric value 前可見。
    - rule_id: metadata_contains_caveats
      description_zh: export metadata 必須包含 caveats。
    - rule_id: scenario_specific_caveats_present
      description_zh: scenario-specific caveat 必須存在。
    - rule_id: not_investment_advice_present
      description_zh: 必須包含不構成投資建議。

  required_acceptance_before_result_generation:
    - target_id: caveat_policy_validated
      required: true
      description_zh: backtest result caveat policy 必須先通過 validator。
    - target_id: result_output_contract_validated
      required: true
      description_zh: result output contract 必須先通過 validator。
    - target_id: output_location_policy_validated
      required: true
      description_zh: output location policy 必須先通過 validator。
    - target_id: result_safety_validator_available
      required: true
      description_zh: result safety validator 必須可執行。
    - target_id: no_prohibited_text_validator_available
      required: true
      description_zh: prohibited text validator 必須可執行。
    - target_id: no_public_auto_output
      required: true
      description_zh: 回測結果不得自動輸出到 public/dashboard。
    - target_id: no_live_allocation_or_trade_signal
      required: true
      description_zh: 回測結果不得包含 live allocation 或 trade signal。

  prohibited_result_fields:
    - live_allocation
    - current_allocation
    - target_weight
    - target_weights
    - portfolio_action
    - buy_signal
    - sell_signal
    - add_signal
    - reduce_signal
    - rebalance_now
    - current_market_recommendation
    - public_dashboard_output
    - dashboard_portfolio_action
    - live_recommendation
    - current_phase_override
    - decision_status_override

  phase_9a4_closure:
    status: caveat_policy_design_only
    conclusion_zh: >
      Phase 9A4 只完成 backtest result caveat policy design。
      尚未執行 real backtest、未計算績效、未產生 result、未建立 output directory、
      未寫入 data/backtests 或 public。
  recommended_next_phase:
    phase_id: 9A5
    title: backtest result safety validator contract
    reason_zh: >
      已完成 result caveat policy。下一步應定義 backtest result safety validator contract，
      確保 future result 能被系統性驗證為 no live allocation、no trade signal、no public auto-output。
