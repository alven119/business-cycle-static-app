        scenario_id: global_financial_crisis
        policy_template_id: boom_de_risking_template
        parameter_set_id: boom_705030_persistence_3m_monthly
        validation_status: passed
        structural_summary:
          input_contract_validated: true
          scenario_mapping_validated: true
          backtest_input_fixture_validated: true
          performance_metrics_computed: false
          allocation_generated: false
          trade_signal_generated: false
          output_written: false
          data_backtests_output_written: false
          public_output_written: false
        required_metric_count: 11
        required_input_count: 9
        caveats_zh:
          - dry-run，不是正式回測。
          - 不產生 portfolio allocation。
          - 不構成投資建議。
        next_required_phase: 8G

