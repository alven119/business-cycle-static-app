    驗證 dry-run output validator 能接受 structural validation summary，
    並拒絕績效欄位、allocation、target weight、trade signal、current recommendation 與 public dashboard output。
  caveats_zh:
    - 此為 dry-run fixtures，不是正式回測。
    - dry-run summary 不代表績效。
    - dry-run 不產生 portfolio allocation。
    - dry-run 不產生買賣訊號。
    - 不構成投資建議。

  valid_dry_run_outputs:
