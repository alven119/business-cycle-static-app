        caveats_zh:
          - backtest-only，不是目前配置建議。
          - 回測結果不代表未來績效。
          - 本結果僅供研究與模型驗證。
          - COVID 屬外生衝擊，結果不可直接推論一般景氣循環策略有效。
          - 不構成投資建議。
        metadata:
