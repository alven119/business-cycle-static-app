backtest_result_safety_validator_fixtures:
  version: 1
  status: draft
  safety_validator_contract_path: specs/portfolio/backtest_result_safety_validator_contract.yaml
  result_output_contract_path: specs/portfolio/backtest_result_output_contract.yaml
  caveat_policy_path: specs/portfolio/backtest_result_caveat_policy.yaml
  output_location_policy_path: specs/portfolio/backtest_output_location_policy.yaml
  objective_zh: >
    提供 future backtest result safety validator 的合法與非法 result fixtures，
    驗證 fixture-only validator 能接受安全的 sample result，
    並拒絕 live allocation、target weight、trade signal、current recommendation、
    public auto-output、phase override、prohibited text 與 caveat 缺失。
  caveats_zh:
    - 此為 safety validator fixtures，不是真實回測結果。
    - fixture values 僅供 schema 與 safety validation 測試。
    - 本階段不計算任何實際績效值。
    - 本階段不產生 result file。
    - 本階段不寫入 data/backtests 或 public。
    - 不構成投資建議。

  valid_result_fixtures:
    - fixture_id: valid_backtest_summary_with_required_caveats
      result:
        result_id: fixture_valid_backtest_summary_v1
        scenario_id: global_financial_crisis
        policy_template_id: boom_de_risking_template
        parameter_set_id: boom_705030_persistence_3m_monthly
        backtest_input_id: gfc_boom_de_risking_monthly_v1
        data_mode: fixture_only
        backtest_only: true
        result_type: backtest_summary
        validation_status: fixture_sample
        metric_summary:
          sample_only: true
          metric_values_are_real: false
          metric_values_computed_now: false
          metrics_available_in_future_contract:
            - total_return
            - annualized_return
            - volatility
            - max_drawdown
            - turnover
        risk_summary:
          sample_only: true
          no_live_decision: true
        caveats_zh:
          - backtest-only，不是目前配置建議。
          - 回測結果不代表未來績效。
          - 本結果僅供研究與模型驗證。
          - 不構成投資建議。
        metadata:
          caveats_zh:
            - backtest-only，不是目前配置建議。
            - 回測結果不代表未來績效。
            - 不構成投資建議。
          output_written: false
          public_output_written: false
          data_backtests_output_written: false
          caveats_visible_before_metrics: true

    - fixture_id: valid_covid_result_with_contextual_caveat
