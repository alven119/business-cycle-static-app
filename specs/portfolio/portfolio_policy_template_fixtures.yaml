        backtest_only: true
        live_allocation_allowed: false
        trade_signal_allowed: false
        public_output_allowed: false
        description_zh: >
          研究榮景後段的 backtest-only 股票曝險參數格，需等 replay/backtest gate 才能運算。
        book_aligned_parameters:
          stock_weight_levels_for_backtest_only:
            - 0.70
            - 0.50
            - 0.30
          short_boom_min_stock_weight_for_backtest_only: 0.50
          extended_boom_year_4_stock_weight_for_backtest_only: 0.30
          parameter_context: backtest_only
        required_signals_before_policy_research:
          - declared_boom_state_timeline_after_replay_gate
          - boom_duration_context
          - boom_ending_watch_persistence
          - recession_confirmation_status
          - false_signal_cost_policy
        prohibited_interpretations_zh:
          - 不得把 boom ending watch 直接視為賣出或減碼指令。
          - 不得未經回測直接使用 70/50/30。
          - 不得輸出目前配置建議。
        caveats_zh:
          - research-only，不是正式投資策略。
          - backtest-only，不是目前配置建議。
