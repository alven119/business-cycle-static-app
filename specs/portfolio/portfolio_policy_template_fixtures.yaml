portfolio_policy_template_fixtures:
  version: 1
  status: draft
  schema_path: specs/portfolio/portfolio_policy_template_schema.yaml
  objective_zh: >
    提供 portfolio policy template 的合法與非法樣本，
    驗證 validator 能接受 Phase75 的八個 research-only / backtest-only templates，
    並拒絕 live allocation、trade signal、current recommendation、target weight 與 prohibited text。
  caveats_zh:
    - 此為 static validation fixtures，不是正式投資策略。
    - 所有權重都是 backtest-only parameters。
    - 不構成投資建議。

  valid_templates:
    - fixture_id: valid_passive_all_stock_baseline
      template:
        template_id: passive_all_stock_baseline
        template_family: book_benchmark_baseline
        asset_universe:
          - equity
        display_name_zh: 被動全股票比較基準
        status: proposed_for_backtest
        research_only: true
        backtest_only: true
        live_allocation_allowed: false
        trade_signal_allowed: false
        public_output_allowed: false
        description_zh: >
          作為未來 policy replay 的比較基準，只用於研究不同模板的相對行為。
        required_signals_before_policy_research:
          - historical_total_return_series_after_explicit_gate
          - replay_window_definition
          - cost_assumption_registry
        prohibited_interpretations_zh:
          - 被動全股票基準只可作比較基準，不得解讀為目前持有建議。
          - 不得把基準績效當作未來績效保證。
        caveats_zh:
          - research-only，不是正式投資策略。
          - backtest-only，不是目前配置建議。
          - 不構成投資建議。

    - fixture_id: valid_stock_cash_initial
      template:
        template_id: stock_cash_initial
        template_family: book_policy_template
        asset_universe:
          - equity
          - cash
        display_name_zh: 股票／現金初階研究模板
        status: proposed_for_backtest
        research_only: true
        backtest_only: true
        live_allocation_allowed: false
        trade_signal_allowed: false
        public_output_allowed: false
        description_zh: >
          研究股票與現金兩資產模板在不同週期 declared-state 路徑下的行為。
        book_aligned_parameters:
          parameter_context: backtest_only
          equity_weight_levels_for_backtest_only:
            - 1.00
            - 0.50
            - 0.00
        required_signals_before_policy_research:
          - declared_cycle_state_timeline_after_replay_gate
          - legal_transition_confirmation_timeline
          - cash_return_series_after_explicit_gate
        prohibited_interpretations_zh:
          - 股票／現金初階模板只可作研究假設，不得解讀為目前現金比例。
          - 不得在未定義成本與再平衡規則前作任何行動。
        caveats_zh:
          - research-only，不是正式投資策略。
          - backtest-only，不是目前配置建議。
          - 不構成投資建議。

    - fixture_id: valid_stock_cash_advanced
      template:
        template_id: stock_cash_advanced
        template_family: book_policy_template
        asset_universe:
          - equity
          - cash
        display_name_zh: 股票／現金進階研究模板
        status: proposed_for_backtest
        research_only: true
        backtest_only: true
        live_allocation_allowed: false
        trade_signal_allowed: false
        public_output_allowed: false
        description_zh: >
          研究股票與現金模板在 continuation、watch、confirmation 分層下的曝險假設。
        book_aligned_parameters:
          parameter_context: backtest_only
          equity_weight_levels_for_backtest_only:
            - 1.00
            - 0.70
            - 0.50
            - 0.30
        required_signals_before_policy_research:
          - declared_cycle_state_timeline_after_replay_gate
          - transition_watch_timeline
          - transition_confirmation_timeline
          - transaction_cost_assumption
        prohibited_interpretations_zh:
          - 股票／現金進階模板只可作研究假設，不得解讀為目前曝險路徑。
          - 不得用 transition watch 直接產生交易行動。
        caveats_zh:
          - research-only，不是正式投資策略。
          - backtest-only，不是目前配置建議。
          - 不構成投資建議。

