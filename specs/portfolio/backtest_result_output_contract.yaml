backtest_result_output_contract:
  version: 1
  status: draft
  objective_zh: >
    定義 future real portfolio backtest result 的 output schema、允許欄位、禁止欄位、
    caveat requirements、output location dependency 與 safety validation dependency。
    本 contract 只允許 result schema design，不允許產生真實回測結果。
  caveats_zh:
    - 此為 backtest result output contract，不是回測結果。
    - 本階段不計算績效。
    - 本階段不產生 result file。
    - 本階段不產生 portfolio allocation。
    - 本階段不產生買賣訊號。
    - 本階段不寫入 data/backtests 或 public。
    - 不構成投資建議。

  source_engine_contract:
    path: specs/portfolio/real_backtest_engine_contract.yaml
    required: true
    required_phase_9a_closure_status: contract_design_only

  output_contract_scope:
    allowed_now:
      define_result_schema: true
      define_allowed_metric_fields: true
      define_required_caveats: true
      define_prohibited_fields: true
      define_output_location_dependency: true
      define_result_safety_dependency: true
      define_future_acceptance_gates: true
    disallowed_now:
      produce_backtest_results: true
      compute_metric_values: true
      write_result_files: true
      write_data_backtests_output: true
      write_public_output: true
      produce_allocation: true
      produce_trade_signal: true
      dashboard_integration: true
      resolver_integration: true

  result_object_schema:
    required_fields:
      - result_id
      - scenario_id
      - policy_template_id
      - parameter_set_id
      - backtest_input_id
      - data_mode
      - backtest_only
      - result_type
      - metric_summary
      - risk_summary
      - caveats_zh
      - validation_status
    optional_fields:
      - sensitivity_summary
      - scenario_notes_zh
      - data_limitations_zh
      - generated_by
      - generated_at
    allowed_metric_fields_for_future_results:
      - total_return
      - annualized_return
      - volatility
      - max_drawdown
      - turnover
      - whipsaw_count
      - false_de_risk_cost
      - false_re_risk_cost
      - missed_recovery_cost
      - late_exit_cost
      - late_reentry_cost
    metric_fields_allowed_now: false
    metric_values_allowed_now: false

  result_type_policy:
    allowed_result_types:
      - backtest_summary
      - scenario_metric_table
      - sensitivity_result_table
      - policy_parameter_result
      - caveat_report
    disallowed_result_types:
      - live_allocation
      - current_market_recommendation
      - trade_signal
      - dashboard_portfolio_action

  prohibited_result_fields:
    - live_allocation
    - current_allocation
    - target_weight
    - target_weights
    - portfolio_action
    - buy_signal
    - sell_signal
    - add_signal
    - reduce_signal
    - rebalance_now
    - current_market_recommendation
    - public_dashboard_output
    - dashboard_portfolio_action
    - live_recommendation
    - current_phase_override
    - decision_status_override

  prohibited_text_patterns:
    zh:
      - 目前建議
      - 建議買進
      - 建議賣出
      - 立即買進
      - 立即賣出
      - 目標配置
      - 買進訊號
      - 賣出訊號
      - 加碼
      - 減碼
    en:
      - current recommendation
      - buy signal
      - sell signal
      - target weight
      - live allocation
      - rebalance now
      - investment advice

  required_result_caveats_zh:
    - backtest-only，不是目前配置建議。
    - 回測結果不代表未來績效。
    - 不構成投資建議。

  output_location_dependency:
    required_future_contract: specs/portfolio/backtest_output_location_policy.yaml
    required_before_writing_results: true
    auto_write_allowed_now: false
    prohibited_auto_write_locations:
      - public
      - docs
      - site
      - dashboard
      - github_pages
      - data/backtests

  result_safety_dependency:
    required_future_contract: specs/portfolio/backtest_result_safety_validator_contract.yaml
    required_before_generating_results: true
    required_checks:
      - no_live_allocation
      - no_current_market_recommendation
      - no_trade_signal
      - no_public_auto_output
      - caveats_required
      - output_location_policy_enforced

  result_caveat_dependency:
    required_future_contract: specs/portfolio/backtest_result_caveat_policy.yaml
    required_before_generating_results: true

  required_acceptance_before_result_generation:
    - target_id: result_output_contract_validated
      required: true
      description_zh: result output contract 必須先通過 validator。
    - target_id: output_location_policy_validated
      required: true
      description_zh: output location policy 必須先通過 validator。
    - target_id: result_safety_validator_available
      required: true
      description_zh: result safety validator 必須已可執行。
    - target_id: result_caveat_policy_validated
      required: true
      description_zh: result caveat policy 必須先通過 validator。
    - target_id: metric_formula_registry_validated
      required: true
      description_zh: metric formula registry 必須先通過 validator。
    - target_id: no_public_auto_output
      required: true
      description_zh: 回測結果不得自動輸出到 public/dashboard。
    - target_id: no_live_allocation_or_trade_signal
      required: true
      description_zh: 回測結果不得包含 live allocation 或 trade signal。

  phase_9a1_closure:
    status: result_contract_design_only
    conclusion_zh: >
      Phase 9A1 只完成 backtest result output contract design。
      尚未執行 real backtest、未計算績效、未產生 result、未寫入 data/backtests 或 public。
  recommended_next_phase:
    phase_id: 9A2
    title: backtest metric formula registry
    reason_zh: >
      已完成 backtest result output contract。下一步應定義 metric formula registry，
      明確定義績效與風險指標公式，但仍不得計算實際績效結果。
