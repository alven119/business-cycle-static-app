prospective_shadow_observation_registry_contract:
  version: 1
  phase: QA9
  registry_id: prospective_shadow_observation_registry_v1
  registry_status: armed_not_started
  default_local_path: data/prospective/shadow_observations/
  append_only: true
  overwrite_allowed: false
  delete_api_allowed: false
  rewrite_api_allowed: false
  compact_api_allowed: false
  record_schema_fields:
    - registry_schema_version
    - registry_id
    - record_id
    - sequence_number
    - previous_record_hash
    - record_hash
    - protocol_id
    - protocol_version
    - model_freeze_id
    - evaluator_freeze_id
    - candidate_selection_freeze_id
    - aggregation_freeze_id
    - observation_period
    - as_of
    - recorded_at_utc
    - eligible_period_start
    - first_eligible_complete_as_of
    - requested_data_mode
    - actual_data_mode
    - input_snapshot_manifest_hash
    - source_cache_manifest_hashes
    - source_series_count
    - source_release_cutoff
    - role_evidence_count
    - evaluator_invoked_count
    - evaluator_output_available_count
    - evaluator_abstention_count
    - raw_transform_only_count
    - unavailable_role_count
    - candidate_selection_enabled
    - candidate_selection_status
    - candidate_phase
    - inspection_status
    - context_prior_used
    - display_hint_used
    - performance_metric_computed
    - portfolio_output_generated
    - public_output_written
    - created_by_code_version
    - provenance_complete
  hash_policy:
    canonical_json: true
    deterministic_key_order: true
    utf8: true
    previous_hash_chain: true
    covers_semantic_fields: true
    secrets_allowed: false
