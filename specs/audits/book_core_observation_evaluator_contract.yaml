book_core_observation_evaluator_contract:
  version: 1
  phase: QA11
  contract_id: book_core_observation_evaluator_contract_v1
  allowed_observation_states:
    - raw_level_observation
    - smoothed_level_observation
    - raw_growth_observation
    - raw_direction_up
    - raw_direction_down
    - raw_direction_unchanged_exact
    - cross_series_raw_relation
    - unavailable
    - invalid
    - temporal_abstention
    - insufficient_lookback
  prohibited_phase_support_states:
    - recovery_entry_support
    - growth_stability_support
    - boom_presence_support
    - recession_confirmation_support
    - formal_recovery_support
  policy:
    numeric_threshold_allowed: false
    candidate_selection_eligible: false
    historical_label_input_allowed: false
    scenario_specific_branch_allowed: false
    external_context_allowed: false
    raw_direction_is_not_turning_point: true
    one_period_movement_is_not_confirmation: true

