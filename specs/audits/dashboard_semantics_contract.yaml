dashboard_semantics_contract:
  version: 1
  status: draft
  semantic_dimensions:
    - data_completeness
    - data_freshness
    - indicator_confidence
    - phase_evidence_strength
    - phase_model_confidence
    - transition_risk
    - decision_confidence
    - external_context_dependency
  rules:
    percentage_must_not_imply_forecast_accuracy: true
    phase_evidence_score_not_business_goodness_score: true
    data_confidence_not_model_confidence: true
    transition_risk_considers_candidate_score_gap: true
    transition_risk_considers_evidence_breadth: true
    transition_risk_considers_persistence: true
    transition_risk_considers_data_freshness: true
    transition_risk_considers_blocking_reason: true
    transition_risk_considers_context_dependency: true
    display_stage_hint_source_required:
      - data-derived
      - context-derived
      - unavailable
  current_audit_findings:
    ambiguous_metric_label_count: 2
    percentage_accuracy_implication_count: 1
    context_derived_hint_unlabeled_count: 1
    candidate_risk_semantic_conflict_count: 1
  summary:
    dashboard_semantics_ready: false
    portfolio_dashboard_integration_allowed: false
