book_method_traceability:
  version: 1
  status: draft
  objective_zh: >
    建立《景氣循環投資》canonical requirements 到 repository 實作、spec、tests 與缺口的 traceability。
    QA0 通過只代表 traceability 與 blocking gates 完整，不代表書籍策略已重現。
  summary:
    book_alignment_claim_allowed: false
    reason_zh: book_core 仍有 missing / conflicting rows，僅可稱為 book-informed 或 partially book-aligned。
