    - requirement_id: phase_order_recession_recovery_growth_boom
      book_section: 四階段與狀態順序
      book_page_reference: "約第 37-38 頁"
      requirement_zh: 四階段順序 recession -> recovery -> growth -> boom -> recession，正常循環按順序運行。
      category: phase_rule
      fidelity_class: book_core
      implementation_status: formal
      implementation_paths:
        - src/business_cycle/phases/state_machine.py
        - specs/common/phase_state_machine.yaml
      test_paths:
        - tests/test_state_machine.py
      data_series_ids: []
      known_limitations: exogenous shock overlay 尚未正式分層。
      divergence_from_book: 現代系統另有 transition controls 與 evidence layers。
      blocking_severity: none
      remediation_required: false
      remediation_owner_phase: none
    - requirement_id: objective_data_not_manual_scenario
      book_section: 四階段與狀態順序
      book_page_reference: "約第 37-38 頁"
      requirement_zh: 階段應由客觀資料決定，不可由人工基準情境直接決定。
      category: phase_rule
      fidelity_class: book_core
      implementation_status: conflicting
      implementation_paths:
        - specs/common/current_cycle_context.yaml
        - src/business_cycle/pipeline/runner.py
      test_paths:
        - tests/test_run_cycle_pipeline_script.py
      data_series_ids: []
      known_limitations: baseline context 會作為 previous phase context，需 ablation 量化。
      divergence_from_book: 外部 baseline context 可能影響 final phase path。
      blocking_severity: P0
      remediation_required: true
      remediation_owner_phase: QA1
    - requirement_id: distinguish_book_system_extension_exception
      book_section: 四階段與狀態順序
      book_page_reference: "約第 37-38 頁"
      requirement_zh: 必須分清 book rule、system implementation、modern extension、exogenous-shock exception。
