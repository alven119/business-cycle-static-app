strict_scoring_abstention_policy:
  version: 1
  statuses:
    scored:
      point_in_time_required: true
      fallback_allowed: false
    abstained_missing_temporal_evidence:
      point_in_time_required: true
      score_emitted: false
      zero_fill_allowed: false
      fallback_allowed: false
    failed_invalid_data:
      point_in_time_required: true
      score_emitted: false
      zero_fill_allowed: false
      fallback_allowed: false
  aggregate_rules:
    complete_phase_score_requires_scored_count: 13
    partial_score_requires_diagnostic_label: true
    incomplete_score_sent_to_formal_resolver_allowed: false
    strict_fallback_allowed: false
