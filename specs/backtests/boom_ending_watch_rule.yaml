boom_ending_watch_rule:
  version: 1
  status: experimental
  data_mode: revised
  objective_zh: >
    使用 refined boom ending candidate indicators 的群組廣度、信心、lead-time pressure 與加權分數，
    建立 experimental boom ending watch rule，用於判斷榮景期後段與衰退前風險升高。
  caveats_zh:
    - 使用修訂後歷史資料，不等同當時投資人可見資料。
    - 此為 experimental watch rule，不代表正式模型已更新。
    - boom ending watch 不等於 confirmed recession。
    - 外生衝擊案例中，boom ending 指標可能是同步壓力反映，不代表事前預測。
    - 不構成投資建議。
  signal_thresholds:
    high_signal_score: 65.0
    strong_signal_score: 75.0
    min_high_signal_confidence: 0.5
    min_strong_signal_confidence: 0.7
  group_thresholds:
    strong_late_cycle_warning:
      min_broad_group_count: 3
      min_high_confidence_high_signal_count: 4
      min_weighted_boom_ending_score: 80.0
    watch:
      min_broad_group_count: 2
      min_high_signal_count: 3
      min_weighted_boom_ending_score: 60.0
    rates_policy_cluster_watch:
      min_rates_policy_high_signal_count: 2
      min_weighted_boom_ending_score: 55.0
      description_zh: >
        若 yield curve / Fed policy 多個訊號集中在 rates_policy 群組，
        即使 broad_group_count 不足，也可給 watch，但不可直接升為 strong。
    weak:
      min_high_signal_count: 1
  required_interpretation_zh:
    strong_late_cycle_warning: 多群組且高信心的榮景後期風險升高。
    watch: 榮景後期風險正在累積，適合作為減碼風險提示，但不是 confirmed recession。
    weak: 有少數 late-cycle 壓力訊號，但廣度不足。
    none: 缺乏明確榮景結束風險訊號。
  expected_diagnostic_outcomes:
    dotcom_bubble:
      "2000-03-31": watch
      "2001-01-31": watch_or_strong
    global_financial_crisis:
      "2006-12-31": watch
      "2007-12-31": watch_or_strong
      "2008-10-31": watch_or_strong
    covid_recession:
      "2019-02-28": watch
      "2020-03-31": watch_or_strong
    late_cycle_2018:
      "2018-12-31": watch
    euro_debt_slowdown:
      "2011-12-31": weak_or_watch
