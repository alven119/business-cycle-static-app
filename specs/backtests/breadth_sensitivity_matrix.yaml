breadth_sensitivity_matrix:
  version: 1
  status: draft
  objective_zh: >
    比較多組 recession-specific breadth confirmation 規則，
    評估是否能降低 COVID 2019 early false recession，同時保留 dotcom / GFC 合理衰退偵測，
    並避免 euro debt / late cycle 2018 新增 false recession。
  caveats_zh:
    - 使用修訂後歷史資料，不等同當時投資人可見資料。
    - 此為模型校準實驗，不代表正式模型已更新。
    - 不構成投資建議。
    - 驗收結果只用於模型診斷，不代表唯一正確答案。

  base_controls:
    transition_watch_required:
      enabled: true
    confirmation_period:
      enabled: true
      required_periods: 2
    hysteresis_margin:
      enabled: true
      min_score_margin: 5.0
    cooldown_period:
      enabled: true
      periods_after_confirmed: 2

  variants:
    - variant_id: v2_current_breadth
      display_name_zh: 目前 v2 breadth 規則
      description_zh: 任 3 個群組支持即可通過 recession breadth。
      breadth_confirmation:
        enabled: true
        target_phases: [recession]
        min_group_count: 3
        min_core_group_count: 2
        min_indicator_count: 4
        min_phase_signal_score: 55.0
        min_indicator_confidence: 0.5
        allowed_groups:
          - employment
          - consumption
          - investment
          - trade
          - rates_financial_conditions
          - commodities
        core_groups:
          - employment
          - consumption
          - investment

    - variant_id: v3_core_required
      display_name_zh: 強制核心群組確認
      description_zh: 衰退確認需至少 employment、consumption、investment 三大核心中兩組支持。
      breadth_confirmation:
        enabled: true
        target_phases: [recession]
        min_group_count: 3
        min_core_group_count: 2
        min_indicator_count: 4
        min_phase_signal_score: 55.0
        min_indicator_confidence: 0.5
        allowed_groups:
          - employment
          - consumption
          - investment
          - trade
          - rates_financial_conditions
          - commodities
        core_groups:
          - employment
          - consumption
          - investment

    - variant_id: v4_core_plus_financial
      display_name_zh: 核心群組加金融條件確認
      description_zh: 衰退確認除核心群組外，需有 rates_financial_conditions 支持。
      breadth_confirmation:
        enabled: true
        target_phases: [recession]
        min_group_count: 4
        min_core_group_count: 2
        min_indicator_count: 5
        min_phase_signal_score: 55.0
        min_indicator_confidence: 0.5
        required_groups:
          - rates_financial_conditions
        allowed_groups:
          - employment
          - consumption
          - investment
          - trade
          - rates_financial_conditions
          - commodities
        core_groups:
          - employment
          - consumption
          - investment

    - variant_id: v5_no_trade_as_core
      display_name_zh: trade 不作為核心確認
      description_zh: trade 可作為輔助，但不能替代 employment / consumption / investment 的核心確認。
      breadth_confirmation:
        enabled: true
        target_phases: [recession]
        min_group_count: 3
        min_core_group_count: 2
        min_indicator_count: 4
        min_phase_signal_score: 55.0
        min_indicator_confidence: 0.5
        allowed_groups:
          - employment
          - consumption
          - investment
          - trade
          - rates_financial_conditions
          - commodities
        core_groups:
          - employment
          - consumption
          - investment
        non_core_groups:
          - trade
          - rates_financial_conditions
          - commodities

    - variant_id: v6_strict_core
      display_name_zh: 嚴格核心確認
      description_zh: 衰退確認需 employment、consumption、investment 三組至少都接近惡化，降低少數指標 false positive。
      breadth_confirmation:
        enabled: true
        target_phases: [recession]
        min_group_count: 3
        min_core_group_count: 3
        min_indicator_count: 5
        min_phase_signal_score: 55.0
        min_indicator_confidence: 0.5
        allowed_groups:
          - employment
          - consumption
          - investment
          - trade
          - rates_financial_conditions
          - commodities
        core_groups:
          - employment
          - consumption
          - investment

  acceptance_targets:
    - target_id: block_covid_2019_false_recession
      description_zh: COVID 2019-02-28 不應 confirmed recession。
      scenario_id: covid_recession
      expected: no_early_false_recession
    - target_id: keep_dotcom_in_window
      description_zh: dotcom full-horizon 仍需在 expected recession window 內偵測。
      scenario_id: dotcom_bubble
      expected: in_window
    - target_id: keep_gfc_in_window
      description_zh: GFC full-horizon 仍需在 expected recession window 內偵測，且不應過度延後。
      scenario_id: global_financial_crisis
      expected: in_window
    - target_id: avoid_out_of_sample_false_recession
      description_zh: euro debt / late cycle 2018 不應新增 confirmed recession。
      scenario_ids:
        - euro_debt_slowdown
        - late_cycle_2018
      expected: avoided
