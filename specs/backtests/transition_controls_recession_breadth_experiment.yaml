transition_controls:
  version: 1
  enabled: true
  description_zh: >
    Phase 7E experimental recession-specific breadth confirmation。
    僅供 calibration experiment 使用，不代表正式模型啟用。

  controls:
    transition_watch_required:
      enabled: true

    confirmation_period:
      enabled: true
      required_periods: 2

    hysteresis_margin:
      enabled: true
      min_score_margin: 5.0

    cooldown_period:
      enabled: true
      periods_after_confirmed: 2

    breadth_confirmation:
      enabled: true
      target_phases:
        - recession
      min_group_count: 3
      min_core_group_count: 2
      min_indicator_count: 4
      min_phase_signal_score: 55.0
      min_indicator_confidence: 0.5
      allowed_groups:
        - employment
        - consumption
        - investment
        - trade
        - rates_financial_conditions
        - commodities
      description_zh: >
        confirmed recession 需要至少多個指標群組同步支持，
        避免少數短期指標導致過早衰退判斷。

  caveats_zh:
    - 此設定為實驗用，不代表正式模型已校準完成。
    - 回測使用修訂後歷史資料，不等同當時投資人可見資料。
    - 不構成投資建議。
