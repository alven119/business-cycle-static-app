phase_acceptance_gates:
  version: 1
  status: draft
  objective_zh: >
    定義 agent 在完成 phase implementation 前必須自行檢查的 common gates 與 phase-specific gates。

common_hard_gates:
  pytest_passed: true
  ruff_passed: true
  no_tracked_generated_outputs: true
  no_secret_leak: true
  no_public_output_unless_requested: true
  no_formal_scoring_change_unless_requested: true
  no_resolver_change_unless_requested: true
  no_fred_provider_change_unless_requested: true
  no_dashboard_integration_unless_requested: true
  no_investment_advice: true

common_checks:
  pytest_command: env -u FRED_API_KEY python -m pytest
  ruff_command: ruff check .
  tracked_generated_scan: git ls-files | grep -E '(__pycache__|\.pyc|\.pytest_cache|\.ruff_cache|\.mypy_cache|data/raw|data/backtests|public)'
  secret_scan: grep -R "FRED_API_KEY" . --exclude-dir=.git --exclude-dir=.venv --exclude-dir=__pycache__ --exclude=".env" | grep "="

phase_specific_gates:
  recovery_refinement_experiment:
    hard_gates:
      - baseline_lookup_warning_count == 0
      - expected_fail_count == 0
      - euro_debt_false_strong_fixed == true
      - late_cycle_2018_false_watch_fixed == true
      - gfc_trough_watch_preserved == true
      - gfc_recovery_watch_preserved == true
      - dotcom_recovery_watch_improved == true
      - covid_trough_watch_improved == true
      - policy_only_strong_blocked == true
      - refinement_candidates_still_open == []
    soft_warnings_allowed:
      - regressed_count > 0 only if expected_fail_count == 0 and diagnostic_notes explain the tradeoff

  boom_ending_watch_overlay:
    hard_gates:
      - fail_count == 0
      - dotcom_has_pre_recession_watch == true
      - gfc_has_pre_recession_watch == true
      - euro_debt_excessive_watch == false
      - late_cycle_2018_excessive_watch == false
    soft_warnings_allowed:
      - warning_count > 0 if caveats explain exogenous shock or watch density

  recovery_diagnostics:
    hard_gates:
      - diagnostic_point_count > 0
      - points_with_missing_scores == 0
    soft_warnings_allowed:
      - mismatch_count > 0 because diagnostics phases are allowed to discover model issues
      - unexpected_strong_points not empty if the phase objective is attribution/refinement planning

  recovery_watch_overlay:
    hard_gates:
      - fail_count == 0
      - gfc_has_trough_or_recovery_watch == true
      - dotcom_has_recovery_watch == true
      - covid_caveated_recovery_watch == true
      - euro_debt_excessive_recovery_watch == false
      - late_cycle_2018_excessive_recovery_watch == false
    soft_warnings_allowed:
      - warning_count > 0 if caveats explain exogenous shock or watch density
      - recovery_watch_density_ratio may be high only if integration guardrails are planned

  recovery_watch_integration_guardrails:
    hard_gates:
      - direct_recovery_confirmation_allowed == false
      - direct_portfolio_action_allowed == false
      - diagnostic_only_allowed == true
      - portfolio_policy_research_input_allowed == true
      - recommended_next_phase == 7G
    soft_warnings_allowed:
      - none

  cycle_transition_evidence_architecture:
    hard_gates:
      - formal_phase_change_allowed_now == false
      - direct_trade_signal_allowed_now == false
      - portfolio_policy_allowed_now == false
      - dashboard_diagnostics_allowed_now == false
      - recommended_next_phase == 7G1
    soft_warnings_allowed:
      - none

  transition_evidence_badge_schema:
    hard_gates:
      - dashboard_contract_allowed_now == false
      - formal_decision_impact_allowed == false
      - direct_trade_signal_allowed == false
      - recommended_next_phase == 7G2
    soft_warnings_allowed:
      - none

  transition_evidence_badge_fixtures:
    hard_gates:
      - valid_pass_count == valid_fixture_count
      - invalid_rejected_count == invalid_fixture_count
      - unexpected_valid_failures == 0
      - unexpected_invalid_passes == 0
      - expected_error_mismatches == 0
      - result == passed
    soft_warnings_allowed:
      - none

  transition_evidence_badge_renderer_contract:
    hard_gates:
