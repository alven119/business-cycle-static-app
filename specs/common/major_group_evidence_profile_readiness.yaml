major_group_evidence_profile_readiness:
  contract_id: major_group_evidence_profile_readiness_v1
  contract_version: "1.0"
  phase_id: 61
  phase_label: major_group_evidence_profile_and_readiness_explanation
  status: active_research_contract
  purpose: >
    Aggregate Phase60 indicator continuity cards into book major-group
    readiness profiles. The profiles explain whether each group is blocked by
    missing numeric values, authorized inputs, proxy/supporting-only context, or
    incomplete source metadata. They are dashboard explanation inputs and not a
    selector, score, rank, or formal phase decision.
  dependencies:
    phase60_continuity_surface: specs/common/evidence_freshness_release_value_continuity.yaml
    major_group_contract: specs/audits/book_phase_major_group_contract.yaml
    role_type_registry: specs/audits/book_core_role_type_registry.yaml
    product_doctrine: specs/common/investment_cycle_product_doctrine.yaml
  policy:
    output_mode: research_only_major_group_evidence_profile_readiness
    public_output_allowed: false
    production_integration_enabled: false
    methodology_requirements_must_not_count_as_indicator_gap: true
    supporting_proxy_may_replace_book_core: false
    missing_value_may_be_treated_as_neutral: false
    metadata_only_may_be_treated_as_phase_support: false
    group_profile_may_emit_phase_support: false
    candidate_phase_emission_allowed: false
    current_phase_emission_allowed: false
    phase_score_rank_or_winner_allowed: false
    portfolio_or_trade_output_allowed: false
  dashboard_view_model:
    view_id: major_group_evidence_profile_readiness
    view_title: Major-Group Evidence Profile and Readiness Explanation
    allowed_uses:
      - local_research_dashboard
      - major_group_readiness_explanation
      - transition_surface_context
      - indicator_group_attribution
    prohibited_uses:
      - formal_current_phase_decision
      - candidate_phase_selection
      - phase_score_or_rank_selection
      - production_decision
      - portfolio_or_trade_decision
  output_restrictions:
    prohibited_fields:
      - current_phase
      - candidate_phase
      - selected_phase
      - winning_phase
      - phase_rank
      - phase_score
      - target_weight
      - allocation_recommendation
      - buy_signal
      - sell_signal
      - trade_action
  hard_gates:
    major_group_evidence_profile_readiness_ready: true
