    exact_schedule_only: true
    accepted_reference_period_formats: [YYYY-MM, YYYY-MM-suffix, YYYY-QN-suffix]
    weekly_without_reference_date_policy: blocked_unresolved_reference_period
    duplicate_primary_key_policy: retain_earliest_registered_event_and_defer_revisions
    actual_release_at_utc_policy: null_until_verified
    observation_date_as_release_date_allowed: false
  execution_policy:
    explicit_operator_confirmation_required: true
    checkpoint_after_each_series: true
    partial_success_preserved: true
    atomic_artifact_writes: true
    idempotent_upsert: true
    source_artifact_checksum_required: true
    tests_require_network: false
    tests_require_postgres: false
    repository_output_allowed: false
  output_restrictions:
