product_capability_progress:
  version: "1.0"
  status: active_research_progress_view
  progress_semantics: >
    Percentages estimate distance to formal production use. They are governed
    orientation numbers, not economic validation, investment advice, or a formal
    current phase decision. Percentages are monotonic by default. They may
    decrease only when a test or gate fails, a safety or data-correctness issue
    is found, code is removed or broken, or the user explicitly expands the
    capability definition. Any decrease must include decrease_reason_zh in the
    affected row.
  phase_id: 54
  phase_label: low_cost_macro_source_completion
  capability_progress:
    - capability_id: C1_BUSINESS_CYCLE_PHASE_ASSESSMENT
      title_zh: 景氣階段判讀能力
      previous_progress_percent: 62
      current_progress_percent: 64
      phase_delta_percent: 2
      phase_impacted: true
      phase_impact_zh: Phase54 排除不可負擔的財經M平方 API 路線，並為 ADP employment 與 consumer confidence 建立低成本、授權或使用者自備資料的補齊矩陣。
      current_status_zh: 已有 declared state、legal next phase、phase evidence profiles、official source wiring、value/context semantics 與 Phase54 低成本來源補齊決策；仍未啟用 formal current/candidate phase。
      remaining_gap_zh: 還需要 governed declared boom start date、將低成本/自備/輔助來源風險接到 indicator detail、更多 transformation rule、validated state-machine migration gate 與 production migration。
      completed_summary_zh: 已完成 declared cycle state、legal next phase、phase evidence profiles、current research evidence 摘要、official source wiring、value/context semantics 與 ADP/consumer confidence 低成本來源決策。
      incomplete_summary_zh: 尚未完成 formal current/candidate phase gate、授權私有資料讀取、完整 transformation rule、validated state-machine migration 與 production migration。
      next_gap_zh: 將 Phase54 source-risk 與 low-cost completion path 接到 indicator detail，讓缺資料角色能清楚顯示 direct、user-supplied 或 supporting-only 狀態。
      decrease_reason_zh:
    - capability_id: C2_TRANSITION_RISK_DETECTION
      title_zh: 轉折風險偵測能力
      previous_progress_percent: 67
      current_progress_percent: 69
      phase_delta_percent: 2
      phase_impacted: true
      phase_impact_zh: Phase54 釐清 boom consumer confidence 與 growth ADP employment 的 direct/licensed/proxy 邊界，降低 transition monitor 對缺口來源的解釋不確定性。
      current_status_zh: 已有 boom transition monitor、transition surface、data-risk labels、value/context semantics 與剩餘 licensed/proxy roles 的補齊路線；仍不自動改寫 declared phase。
      remaining_gap_zh: 需要補 declared boom start governance、turning-point confirmation rules、source-risk dashboard rendering 與更完整的 watch/confirmation 視覺化。
      completed_summary_zh: 已完成 legal next transition surface、boom transition monitor、data-risk labeling、官方來源定位、transition indicator value/context wiring 與低成本補齊矩陣。
      incomplete_summary_zh: 尚未完成 governed phase-age context、完整 turning-point confirmation rules、所有 transition lanes 的 actual value dashboard rendering，以及授權私有來源讀取。
      next_gap_zh: 將低成本/自備/輔助來源狀態接入 transition indicator cards，讓轉折風險頁能說明缺口如何影響 watch/confirmation。
      decrease_reason_zh:
    - capability_id: C3_EXPLAINABILITY_AND_ATTRIBUTION
      title_zh: 解釋能力
      previous_progress_percent: 70
      current_progress_percent: 72
      phase_delta_percent: 2
      phase_impacted: true
      phase_impact_zh: Phase54 將 ADP 與 consumer confidence 的資料風險、替代程度、不可替代規則與使用者自備資料路線寫成可測 contract。
      current_status_zh: 指標意涵、來源、替代程度、風險標籤、value context、why-not-formal、lineage 與 low-cost completion path 更完整。
      remaining_gap_zh: 需要將 Phase54 source-risk/low-cost fields 接到 dashboard indicator detail 與資料血緣頁。
      completed_summary_zh: 已完成指標意涵、來源身份、替代程度、data-risk labels、why-not-formal、lineage、value/context 欄位與低成本來源補齊決策。
      incomplete_summary_zh: 尚未把所有 source-risk、authorized private input、numeric context、transformation、release timing 與 abstention reason 完整接到 dashboard drill-down。
      next_gap_zh: 讓 indicator detail 顯示 direct/license/user-supplied/proxy-only 狀態、資料風險與為什麼不能替代 book-core。
      decrease_reason_zh:
    - capability_id: C4_PORTFOLIO_POLICY_RESEARCH
      title_zh: Portfolio policy research 能力
      previous_progress_percent: 38
      current_progress_percent: 38
      phase_delta_percent: 0
      phase_impacted: false
      phase_impact_zh: 本 Phase 未修改 portfolio policy template 或 policy replay。
      current_status_zh: 研究模板與安全邊界存在，但沒有 current allocation 或交易建議。
      remaining_gap_zh: 後續仍需 policy replay、cash-flow-aware backtest 與安全 dashboard 呈現。
      completed_summary_zh: 已完成 portfolio policy research 的基本安全邊界與模板方向，並維持非投資建議定位。
      incomplete_summary_zh: 尚未完成 policy replay、cash-flow-aware backtest、成本/再平衡模型與 dashboard 研究呈現。
      next_gap_zh: 在 validation/replay gate 通過後，補 policy replay 與 cash-flow-aware research view。
      decrease_reason_zh:
    - capability_id: C5_HISTORICAL_REPLAY_AND_BACKTEST
      title_zh: 歷史重播與回測能力
      previous_progress_percent: 52
      current_progress_percent: 52
      phase_delta_percent: 0
      phase_impacted: false
      phase_impact_zh: 本 Phase 不執行 replay/backtest，也不新增 performance metric。
      current_status_zh: 歷史 validation/research artifacts 已有，真正 strict replay/backtest 仍受資料完整度與 gate 限制。
      remaining_gap_zh: 需要 transition timing replay、policy replay、total-return/cash-flow-aware backtest gate。
      completed_summary_zh: 已完成 research-only validation artifact chain、label comparison、coverage/accuracy research artifacts 與 safety gates。
      incomplete_summary_zh: 尚未完成 strict point-in-time replay、transition timing replay、total-return backtest 與 portfolio performance research。
      next_gap_zh: 先補 transition timing replay 所需 evidence continuity，再進入 policy/backtest gate。
      decrease_reason_zh:
    - capability_id: C6_SAFE_OUTPUT_GOVERNANCE
      title_zh: 安全輸出治理能力
      previous_progress_percent: 76
      current_progress_percent: 77
      phase_delta_percent: 1
      phase_impacted: true
      phase_impact_zh: Phase54 明確排除財經M平方 API、禁止 silent substitution，並確認 PAYEMS/UMich sentiment 只能 supporting-only。
      current_status_zh: safety scans、closure checks、forbidden output policy、product progress monotonic rule、production isolation 與 no-silent-substitution gates 持續運作。
      remaining_gap_zh: 需要把 source-risk fields 接到所有 product-facing surface，並固定檢查 forbidden-field 與替代程度標示。
      completed_summary_zh: 已完成 safety scans、closure checks、forbidden output policy、production isolation、no-silent-substitution gates、產品進度 monotonic rule 與低成本來源安全契約。
      incomplete_summary_zh: 尚未把所有 product-facing scripts/surfaces 統一納入相同 forbidden-field、source-risk 與 progress reporting 契約。
      next_gap_zh: 將 Phase54 source-risk 欄位納入 dashboard detail 時，維持相同 safety scan 與 forbidden-field checks。
      decrease_reason_zh:
    - capability_id: F1_TEMPORAL_INTEGRITY_AND_ABSTENTION
      title_zh: 時間完整性與 abstention
      previous_progress_percent: 76
      current_progress_percent: 77
      phase_delta_percent: 1
      phase_impacted: true
      phase_impact_zh: Phase54 將 direct licensed source、user-supplied authorized input 與 supporting proxy 狀態分開，讓缺口可以 abstain 而不是被 proxy 填補。
      current_status_zh: release metadata、value context、alignment status、revised/PIT 分層與缺口 abstention 邊界清楚；latest current research 仍標示 current/revised，不宣稱 PIT。
      remaining_gap_zh: 需要後續 PIT cache/backfill、exact vintage coverage、authorized private input provenance 與 actual current cache display 擴充。
      completed_summary_zh: 已完成 release metadata、data mode caveat、revised/current 與 point-in-time 區分、missing/stale abstention、value context、alignment visibility 與 proxy abstention 邊界。
      incomplete_summary_zh: 尚未完成完整 exact-vintage cache、PIT backfill、所有 historical scenario 的 vintage availability、authorized private input provenance 與 dashboard actual-value rendering。
      next_gap_zh: 擴充 indicator detail 的 source-risk/value/release context，並保留 revised/current、strict PIT 與 proxy-only caveat。
      decrease_reason_zh:
    - capability_id: F2_MODEL_GOVERNANCE_AND_PROSPECTIVE_VALIDATION
      title_zh: 模型治理與前瞻驗證
      previous_progress_percent: 70
      current_progress_percent: 70
      phase_delta_percent: 0
      phase_impacted: false
      phase_impact_zh: 本 Phase 不改 prospective registry、freeze lineage 或 validation protocol。
      current_status_zh: freeze/closure/prospective governance 持續隔離，prospective registry 未啟動。
      remaining_gap_zh: 未來仍需前瞻驗證資料累積與 explicit migration gate。
      completed_summary_zh: 已完成 freeze lineage、closure gates、prospective registry isolation 與 no-result-peeking governance。
      incomplete_summary_zh: 尚未完成前瞻資料累積、economic validation、holdout/migration gate 與 production book-fidelity migration。
      next_gap_zh: 保持 prospective wait state，等資料累積後再建立 explicit validation/migration gate。
      decrease_reason_zh:
