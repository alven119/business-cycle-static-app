product_capability_progress:
  version: "1.0"
  status: active_research_progress_view
  progress_semantics: >
    Percentages estimate distance to formal production use. They are governed
    orientation numbers, not economic validation, investment advice, or a formal
    current phase decision. Percentages are monotonic by default. They may
    decrease only when a test or gate fails, a safety or data-correctness issue
    is found, code is removed or broken, or the user explicitly expands the
    capability definition. Any decrease must include decrease_reason_zh in the
    affected row.
  phase_id: 62
  phase_label: indicator_to_dashboard_explanation_drill_down
  capability_progress:
    - capability_id: C1_BUSINESS_CYCLE_PHASE_ASSESSMENT
      title_zh: 景氣階段判讀能力
      previous_progress_percent: 89
      current_progress_percent: 91
      phase_delta_percent: 2
      phase_impacted: true
      phase_impact_zh: Phase62 將 major-group profiles 與 39 個 role detail cards 串成 drill-down，讓 dashboard 可以從群組一路展開到 role、source、release timing、transformation、data mode 與 abstention reason。
      current_status_zh: 已有 declared state、legal next phase、phase evidence profiles、official source wiring、coverage matrix、indicator detail cards、boom-to-recession surface、全循環 transition lane templates、continuity surface、24 個 major-group profiles，以及 Phase62 drill-down；仍未啟用 formal current/candidate phase。
      remaining_gap_zh: 還需要 governed declared boom start date、更多 actual numeric cache/user input、transition timing replay preview 與 production migration gate。
      completed_summary_zh: 已完成 declared cycle state、legal next phase、phase evidence profiles、official source wiring、coverage matrix、39-role indicator detail cards、boom-to-recession transition surface、四個合法 transition lane templates、資料新鮮度/發布時點/目前值連續性 surface、24 個 major-group readiness profiles，以及 dashboard drill-down。
      incomplete_summary_zh: 尚未完成 formal current/candidate phase gate、declared boom 起始日治理、授權私有資料讀取、更多 actual numeric values、transition timing replay preview 與 production migration。
      next_gap_zh: 建立 research-only transition timing replay preview，讓使用者看見 evidence 如何隨時間累積、延遲、矛盾或 abstain。
      decrease_reason_zh:
    - capability_id: C2_TRANSITION_RISK_DETECTION
      title_zh: 轉折風險偵測能力
      previous_progress_percent: 91
      current_progress_percent: 93
      phase_delta_percent: 2
      phase_impacted: true
      phase_impact_zh: Phase62 讓 transition surface 與 major-group 狀態可展開到 role/source/release/rule/provenance 層，方便判讀每條 transition lane 為何只能 watch、abstain 或保持缺口。
      current_status_zh: 已有 boom transition monitor、completed boom-to-recession surface、data-risk labels、value/context semantics、coverage burn-down view、indicator-level detail cards、全循環 transition lane template registry、continuity 缺口解釋、major-group profiles 與 dashboard drill-down；仍不自動改寫 declared phase。
      remaining_gap_zh: 需要 governed phase-age context、turning-point confirmation rules、更多 numeric current cache/user input，以及 transition timing replay preview。
      completed_summary_zh: 已完成 legal next transition surface、boom transition monitor、boom-to-recession 四 lane completion、data-risk labeling、官方來源定位、value/context wiring、coverage burn-down view、indicator detail cards、全循環 legal transition templates、freshness/release/value continuity explanation、major-group transition readiness explanation，以及 role-level drill-down。
      incomplete_summary_zh: 尚未完成 governed phase-age context、turning-point confirmation rules、授權私有來源讀取、更多 numeric values 與 transition timing replay preview。
      next_gap_zh: 補 research-only transition timing replay preview，檢查 transition evidence 在歷史時點如何累積與 abstain。
      decrease_reason_zh:
