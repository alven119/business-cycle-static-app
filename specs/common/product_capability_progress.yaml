product_capability_progress:
  version: "1.0"
  status: active_research_progress_view
  progress_semantics: >
    Percentages estimate distance to formal production use. They are governed
    orientation numbers, not economic validation, investment advice, or a formal
    current phase decision. Percentages are monotonic by default. They may
    decrease only when a test or gate fails, a safety or data-correctness issue
    is found, code is removed or broken, or the user explicitly expands the
    capability definition. Any decrease must include decrease_reason_zh in the
    affected row.
  phase_id: 56
  phase_label: indicator_detail_source_risk_and_value_rendering
  capability_progress:
    - capability_id: C1_BUSINESS_CYCLE_PHASE_ASSESSMENT
      title_zh: 景氣階段判讀能力
      previous_progress_percent: 66
      current_progress_percent: 70
      phase_delta_percent: 4
      phase_impacted: true
      phase_impact_zh: Phase56 將 39 個 macro role 接成 indicator detail cards，讓 declared-state dashboard 可看見來源風險、freshness、release timing、value context 與 why-not-evidence。
      current_status_zh: 已有 declared state、legal next phase、phase evidence profiles、official source wiring、coverage matrix 與 39 張 indicator detail cards；仍未啟用 formal current/candidate phase。
      remaining_gap_zh: 還需要 governed declared boom start date、完整 transition surface、major-group evidence profile、更多 actual numeric cache/user input 與 production migration gate。
      completed_summary_zh: 已完成 declared cycle state、legal next phase、phase evidence profiles、official source wiring、coverage matrix，以及每個 macro role 的 source-risk/value/freshness detail card。
      incomplete_summary_zh: 尚未完成 formal current/candidate phase gate、declared boom 起始日治理、完整 transition lanes、major-group profile、授權私有資料讀取與 production migration。
      next_gap_zh: 完成 boom-to-recession transition surface，直接使用 indicator detail cards 呈現 continuation、watch、confirmation 與 abstention。
      decrease_reason_zh:
    - capability_id: C2_TRANSITION_RISK_DETECTION
      title_zh: 轉折風險偵測能力
      previous_progress_percent: 71
      current_progress_percent: 74
      phase_delta_percent: 3
      phase_impacted: true
      phase_impact_zh: Phase56 讓 transition monitor 可在 indicator detail 層直接讀到 source tier、data risk、freshness、release timing 與 why-not-confirmation caveat。
      current_status_zh: 已有 boom transition monitor、transition surface、data-risk labels、value/context semantics、coverage burn-down view 與 indicator-level detail cards；仍不自動改寫 declared phase。
      remaining_gap_zh: 需要補 declared boom start governance、boom-to-recession surface completion、turning-point confirmation rules 與更完整的 watch/confirmation 視覺化。
      completed_summary_zh: 已完成 legal next transition surface、boom transition monitor、data-risk labeling、官方來源定位、value/context wiring、coverage burn-down view 與 indicator detail source-risk cards。
      incomplete_summary_zh: 尚未完成 governed phase-age context、完整 boom-to-recession transition surface、turning-point confirmation rules，以及授權私有來源讀取。
      next_gap_zh: 將 Phase56 cards 接進 boom-to-recession transition surface，清楚分開 continuation、watch、confirmation、contradiction 與 abstention。
      decrease_reason_zh:
    - capability_id: C3_EXPLAINABILITY_AND_ATTRIBUTION
      title_zh: 解釋能力
      previous_progress_percent: 75
      current_progress_percent: 80
      phase_delta_percent: 5
      phase_impacted: true
      phase_impact_zh: Phase56 把每個 macro role 的 source-risk、value context、freshness、release timing、transformation status 與 why-not-evidence 做成 dashboard detail cards。
      current_status_zh: 指標意涵、來源、替代程度、風險標籤、value context、freshness、release timing、why-not-evidence、lineage 與 next gap 已能以 role card 呈現。
      remaining_gap_zh: 需要把 detail cards 深入 transition surface、major-group profile、資料血緣頁與最終 dashboard renderer，並補更多 local cache numeric values。
      completed_summary_zh: 已完成指標意涵、來源身份、替代程度、data-risk labels、why-not-formal、lineage、value/freshness/release context 與 39-role indicator detail cards。
      incomplete_summary_zh: 尚未完成完整 transition drill-down、major-group attribution、資料血緣頁 renderer、所有 numeric values 與授權私有來源讀取。
      next_gap_zh: 在 Phase57 transition surface 中使用 detail cards 顯示每個 evidence item 的 source-risk、value context 與 why-not-confirmation。
      decrease_reason_zh:
    - capability_id: C4_PORTFOLIO_POLICY_RESEARCH
      title_zh: Portfolio policy research 能力
      previous_progress_percent: 38
      current_progress_percent: 38
      phase_delta_percent: 0
      phase_impacted: false
      phase_impact_zh: 本 Phase 未修改 portfolio policy template 或 policy replay。
      current_status_zh: 研究模板與安全邊界存在，但沒有 current allocation 或交易建議。
      remaining_gap_zh: 後續仍需 policy replay、cash-flow-aware backtest 與安全 dashboard 呈現。
      completed_summary_zh: 已完成 portfolio policy research 的基本安全邊界與模板方向，並維持非投資建議定位。
      incomplete_summary_zh: 尚未完成 policy replay、cash-flow-aware backtest、成本/再平衡模型與 dashboard 研究呈現。
      next_gap_zh: 在 validation/replay gate 通過後，補 policy replay 與 cash-flow-aware research view。
      decrease_reason_zh:
    - capability_id: C5_HISTORICAL_REPLAY_AND_BACKTEST
      title_zh: 歷史重播與回測能力
      previous_progress_percent: 52
      current_progress_percent: 52
      phase_delta_percent: 0
      phase_impacted: false
      phase_impact_zh: 本 Phase 不執行 replay/backtest，也不新增 performance metric。
      current_status_zh: 歷史 validation/research artifacts 已有，真正 strict replay/backtest 仍受資料完整度與 gate 限制。
      remaining_gap_zh: 需要 transition timing replay、policy replay、total-return/cash-flow-aware backtest gate。
      completed_summary_zh: 已完成 research-only validation artifact chain、label comparison、coverage/accuracy research artifacts 與 safety gates。
      incomplete_summary_zh: 尚未完成 strict point-in-time replay、transition timing replay、total-return backtest 與 portfolio performance research。
      next_gap_zh: 先補 transition timing replay 所需 evidence continuity，再進入 policy/backtest gate。
      decrease_reason_zh:
    - capability_id: C6_SAFE_OUTPUT_GOVERNANCE
      title_zh: 安全輸出治理能力
      previous_progress_percent: 78
      current_progress_percent: 79
      phase_delta_percent: 1
      phase_impacted: true
      phase_impact_zh: Phase56 將 forbidden fields、proxy promotion、silent substitution、false resolution 與 no phase emission gates 套用到 indicator detail view。
      current_status_zh: safety scans、closure checks、forbidden output policy、product progress monotonic rule、production isolation、no-silent-substitution gates 與 indicator detail gates 持續運作。
      remaining_gap_zh: 需要把相同 source-risk/forbidden-field 契約套用到 transition surface、major-group profile 與最終 dashboard renderer。
      completed_summary_zh: 已完成 safety scans、closure checks、forbidden output policy、production isolation、no-silent-substitution gates、產品進度 monotonic rule、coverage matrix 與 indicator detail hard gates。
      incomplete_summary_zh: 尚未把所有 transition/major-group/product-facing surfaces 統一納入相同 forbidden-field、source-risk、actual-value 與 progress reporting 契約。
      next_gap_zh: Phase57 transition surface 必須沿用 Phase56 indicator detail safety gates。
      decrease_reason_zh:
    - capability_id: F1_TEMPORAL_INTEGRITY_AND_ABSTENTION
      title_zh: 時間完整性與 abstention
      previous_progress_percent: 78
      current_progress_percent: 79
      phase_delta_percent: 1
      phase_impacted: true
      phase_impact_zh: Phase56 將 freshness、release timing、missing/authorized/proxy-only 與 metadata-only value context 放進每張 indicator detail card。
      current_status_zh: release metadata、value context、alignment status、revised/PIT 分層、缺口 abstention 邊界、coverage gap classification 與 detail-card freshness context 清楚；latest current research 仍標示 current/revised，不宣稱 PIT。
      remaining_gap_zh: 需要後續 PIT cache/backfill、exact vintage coverage、authorized private input provenance、更多 numeric current cache display 與 transition timing replay。
      completed_summary_zh: 已完成 release metadata、data mode caveat、revised/current 與 point-in-time 區分、missing/stale abstention、value context、alignment visibility、proxy abstention 邊界、coverage classification 與 indicator detail freshness context。
      incomplete_summary_zh: 尚未完成完整 exact-vintage cache、PIT backfill、所有 historical scenario 的 vintage availability、authorized private input provenance 與更多 numeric current values。
      next_gap_zh: Phase57 transition surface 應直接顯示每個 transition evidence 的 freshness/release context 與 abstention reason。
      decrease_reason_zh:
    - capability_id: F2_MODEL_GOVERNANCE_AND_PROSPECTIVE_VALIDATION
      title_zh: 模型治理與前瞻驗證
      previous_progress_percent: 70
      current_progress_percent: 70
      phase_delta_percent: 0
      phase_impacted: false
      phase_impact_zh: 本 Phase 不改 prospective registry、freeze lineage 或 validation protocol。
      current_status_zh: freeze/closure/prospective governance 持續隔離，prospective registry 未啟動。
      remaining_gap_zh: 未來仍需前瞻驗證資料累積與 explicit migration gate。
      completed_summary_zh: 已完成 freeze lineage、closure gates、prospective registry isolation 與 no-result-peeking governance。
      incomplete_summary_zh: 尚未完成前瞻資料累積、economic validation、holdout/migration gate 與 production book-fidelity migration。
      next_gap_zh: 保持 prospective wait state，等資料累積後再建立 explicit validation/migration gate。
      decrease_reason_zh:
