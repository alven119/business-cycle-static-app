product_capability_progress:
  version: "1.0"
  status: active_research_progress_view
  progress_semantics: >
    Percentages estimate distance to formal production use. They are governed
    orientation numbers, not economic validation, investment advice, or a formal
    current phase decision. Percentages are monotonic by default. They may
    decrease only when a test or gate fails, a safety or data-correctness issue
    is found, code is removed or broken, or the user explicitly expands the
    capability definition. Any decrease must include decrease_reason_zh in the
    affected row.
  phase_id: 61
  phase_label: major_group_evidence_profile_and_readiness_explanation
  capability_progress:
    - capability_id: C1_BUSINESS_CYCLE_PHASE_ASSESSMENT
      title_zh: 景氣階段判讀能力
      previous_progress_percent: 86
      current_progress_percent: 89
      phase_delta_percent: 3
      phase_impacted: true
      phase_impact_zh: Phase61 將 39 個角色聚合成 24 個 book major-group readiness profiles，讓 declared-state dashboard 能從群組層理解哪些是 metadata-ready、授權缺口、proxy-only 或 source metadata 不完整。
      current_status_zh: 已有 declared state、legal next phase、phase evidence profiles、official source wiring、coverage matrix、indicator detail cards、boom-to-recession surface、全循環 transition lane templates、continuity surface，以及 Phase61 major-group profile；仍未啟用 formal current/candidate phase。
      remaining_gap_zh: 還需要 governed declared boom start date、更多 actual numeric cache/user input、indicator-to-dashboard drill-down 與 production migration gate。
      completed_summary_zh: 已完成 declared cycle state、legal next phase、phase evidence profiles、official source wiring、coverage matrix、39-role indicator detail cards、boom-to-recession transition surface、四個合法 transition lane templates、資料新鮮度/發布時點/目前值連續性 surface，以及 24 個 major-group readiness profiles。
      incomplete_summary_zh: 尚未完成 formal current/candidate phase gate、declared boom 起始日治理、授權私有資料讀取、更多 actual numeric values、indicator-to-dashboard drill-down 與 production migration。
      next_gap_zh: 建立 indicator-to-dashboard explanation drill-down，讓使用者能從 major group 一路點回 role、source、release timing、transformation 與 abstention reason。
      decrease_reason_zh:
    - capability_id: C2_TRANSITION_RISK_DETECTION
      title_zh: 轉折風險偵測能力
      previous_progress_percent: 89
      current_progress_percent: 91
      phase_delta_percent: 2
      phase_impacted: true
      phase_impact_zh: Phase61 讓 transition surface 可回溯到 major-group readiness，明確標示核心群組是否因 metadata-only、authorized input、proxy/supporting-only 或 source metadata 缺口而不能升級。
      current_status_zh: 已有 boom transition monitor、completed boom-to-recession surface、data-risk labels、value/context semantics、coverage burn-down view、indicator-level detail cards、全循環 transition lane template registry、continuity 缺口解釋，以及 major-group readiness profiles；仍不自動改寫 declared phase。
      remaining_gap_zh: 需要 governed phase-age context、turning-point confirmation rules、更多 numeric current cache/user input，以及 dashboard drill-down。
      completed_summary_zh: 已完成 legal next transition surface、boom transition monitor、boom-to-recession 四 lane completion、data-risk labeling、官方來源定位、value/context wiring、coverage burn-down view、indicator detail cards、全循環 legal transition templates、freshness/release/value continuity explanation，以及 major-group transition readiness explanation。
      incomplete_summary_zh: 尚未完成 governed phase-age context、turning-point confirmation rules、授權私有來源讀取、更多 numeric values 與最終 dashboard drill-down。
      next_gap_zh: 補 indicator-to-dashboard explanation drill-down，讓每條 transition lane 的 group 狀態可展開到 role 與 source 層。
      decrease_reason_zh:
    - capability_id: C3_EXPLAINABILITY_AND_ATTRIBUTION
      title_zh: 解釋能力
      previous_progress_percent: 90
      current_progress_percent: 92
      phase_delta_percent: 2
      phase_impacted: true
      phase_impact_zh: Phase61 把角色層的缺值、新鮮度、授權與 proxy 風險上捲到 24 個 major groups，讓使用者能在群組層理解為何目前只能解釋而不能決策。
      current_status_zh: 指標意涵、來源、替代程度、風險標籤、value context、freshness、release timing、why-not-evidence、lineage、next gap、transition attribution、continuity gap explanation 與 major-group readiness explanation 已能以 research surface 呈現。
      remaining_gap_zh: 需要資料血緣頁 renderer、所有 numeric values、授權私有來源讀取、governed phase-age context，以及 dashboard drill-down 串接。
      completed_summary_zh: 已完成指標意涵、來源身份、替代程度、data-risk labels、why-not-formal、lineage、value/freshness/release context、39-role detail cards、transition lane attribution、freshness/release/value continuity gap explanation，以及 24 個 major-group attribution profiles。
      incomplete_summary_zh: 尚未完成資料血緣頁 renderer、所有 numeric values、授權私有來源讀取、governed phase-age context 與最終 dashboard drill-down。
      next_gap_zh: 補 indicator-to-dashboard drill-down，讓每個 group profile 可展開到 role、source、transformation、release timing 與 abstention reason。
      decrease_reason_zh:
    - capability_id: C4_PORTFOLIO_POLICY_RESEARCH
      title_zh: Portfolio policy research 能力
      previous_progress_percent: 38
      current_progress_percent: 38
      phase_delta_percent: 0
      phase_impacted: false
      phase_impact_zh: 本 Phase 未修改 portfolio policy template 或 policy replay。
      current_status_zh: 研究模板與安全邊界存在，但沒有 current allocation 或交易建議。
      remaining_gap_zh: 後續仍需 policy replay、cash-flow-aware backtest 與安全 dashboard 呈現。
      completed_summary_zh: 已完成 portfolio policy research 的基本安全邊界與模板方向，並維持非投資建議定位。
      incomplete_summary_zh: 尚未完成 policy replay、cash-flow-aware backtest、成本/再平衡模型與 dashboard 研究呈現。
      next_gap_zh: 在 validation/replay gate 通過後，補 policy replay 與 cash-flow-aware research view。
      decrease_reason_zh:
    - capability_id: C5_HISTORICAL_REPLAY_AND_BACKTEST
      title_zh: 歷史重播與回測能力
      previous_progress_percent: 52
      current_progress_percent: 52
      phase_delta_percent: 0
      phase_impacted: false
      phase_impact_zh: 本 Phase 不執行 replay/backtest，也不新增 performance metric。
      current_status_zh: 歷史 validation/research artifacts 已有，真正 strict replay/backtest 仍受資料完整度與 gate 限制。
      remaining_gap_zh: 需要 transition timing replay、policy replay、total-return/cash-flow-aware backtest gate。
      completed_summary_zh: 已完成 research-only validation artifact chain、label comparison、coverage/accuracy research artifacts 與 safety gates。
      incomplete_summary_zh: 尚未完成 strict point-in-time replay、transition timing replay、total-return backtest 與 portfolio performance research。
      next_gap_zh: 先補 transition timing replay 所需 evidence continuity，再進入 policy/backtest gate。
      decrease_reason_zh:
    - capability_id: C6_SAFE_OUTPUT_GOVERNANCE
      title_zh: 安全輸出治理能力
      previous_progress_percent: 82
      current_progress_percent: 83
      phase_delta_percent: 1
      phase_impacted: true
      phase_impact_zh: Phase61 將 missing value 不得當 neutral、metadata-only 不得升級、supporting proxy 不得替代 book-core、methodology requirement 不得算成 indicator gap 的 gate 套到 major-group surface。
      current_status_zh: safety scans、closure checks、forbidden output policy、product progress monotonic rule、production isolation、no-silent-substitution gates、indicator detail gates、transition completion gates、full-cycle template gates、continuity gates 與 major-group profile gates 持續運作。
      remaining_gap_zh: 需要把相同 source-risk/forbidden-field 契約套用到 dashboard drill-down、資料血緣 renderer 與最終 renderer。
      completed_summary_zh: 已完成 safety scans、closure checks、forbidden output policy、production isolation、no-silent-substitution gates、產品進度 monotonic rule、coverage matrix、indicator detail hard gates、transition completion hard gates、full-cycle template hard gates、continuity hard gates 與 major-group readiness hard gates。
      incomplete_summary_zh: 尚未把所有 product-facing drill-down、lineage renderer 與 final dashboard surfaces 統一納入相同 forbidden-field、source-risk、actual-value、continuity 與 progress reporting 契約。
      next_gap_zh: Phase62 drill-down 必須沿用 missing/proxy 不可升級、methodology 不進 indicator denominator 與 no phase emission gates。
      decrease_reason_zh:
    - capability_id: F1_TEMPORAL_INTEGRITY_AND_ABSTENTION
      title_zh: 時間完整性與 abstention
      previous_progress_percent: 83
      current_progress_percent: 84
      phase_delta_percent: 1
      phase_impacted: true
      phase_impact_zh: Phase61 把 continuity 與 abstention 語意聚合到 major-group profile，並把 methodology requirement 排除在 indicator denominator 外，避免 temporal safety gap 被誤標成 phase evidence gap。
      current_status_zh: release metadata、value context、alignment status、revised/PIT 分層、缺口 abstention 邊界、coverage gap classification、detail-card freshness context、transition-lane abstention context、全循環 template abstention semantics、continuity gap explanation 與 major-group abstention explanation 清楚；latest current research 仍標示 current/revised，不宣稱 PIT。
      remaining_gap_zh: 需要後續 PIT cache/backfill、exact vintage coverage、authorized private input provenance、更多 numeric current cache display、governed phase-age caveats 與 transition timing replay。
      completed_summary_zh: 已完成 release metadata、data mode caveat、revised/current 與 point-in-time 區分、missing/stale abstention、value context、alignment visibility、proxy abstention 邊界、coverage classification、indicator detail freshness context、transition-lane freshness context、全循環 transition template abstention semantics、continuity gap explanation，以及 major-group abstention explanation。
      incomplete_summary_zh: 尚未完成完整 exact-vintage cache、PIT backfill、所有 historical scenario 的 vintage availability、authorized private input provenance、更多 numeric current values 與 governed phase-age caveats。
      next_gap_zh: Phase62 應把 major-group abstention 展開到 role/source/release/provenance drill-down。
      decrease_reason_zh:
    - capability_id: F2_MODEL_GOVERNANCE_AND_PROSPECTIVE_VALIDATION
      title_zh: 模型治理與前瞻驗證
      previous_progress_percent: 70
      current_progress_percent: 70
      phase_delta_percent: 0
      phase_impacted: false
      phase_impact_zh: 本 Phase 不改 prospective registry、freeze lineage 或 validation protocol。
      current_status_zh: freeze/closure/prospective governance 持續隔離，prospective registry 未啟動。
      remaining_gap_zh: 未來仍需前瞻驗證資料累積與 explicit migration gate。
      completed_summary_zh: 已完成 freeze lineage、closure gates、prospective registry isolation 與 no-result-peeking governance。
      incomplete_summary_zh: 尚未完成前瞻資料累積、economic validation、holdout/migration gate 與 production book-fidelity migration。
      next_gap_zh: 保持 prospective wait state，等資料累積後再建立 explicit validation/migration gate。
      decrease_reason_zh:
