product_capability_progress:
  version: "1.0"
  status: active_research_progress_view
  progress_semantics: >
    Percentages estimate distance to formal production use. They are governed
    orientation numbers, not economic validation, investment advice, or a formal
    current phase decision. Percentages are monotonic by default. They may
    decrease only when a test or gate fails, a safety or data-correctness issue
    is found, code is removed or broken, or the user explicitly expands the
    capability definition. Any decrease must include decrease_reason_zh in the
    affected row.
  phase_id: 66
  phase_label: archive_regression_shards_and_nightly_matrix
  capability_progress:
    - capability_id: C1_BUSINESS_CYCLE_PHASE_ASSESSMENT
      title_zh: 景氣階段判讀能力
      previous_progress_percent: 93
      current_progress_percent: 93
      phase_delta_percent: 0
      phase_impacted: true
      phase_impact_zh: Phase66 將 archive regression 切成 nightly shards，讓景氣判讀相關的 product-core gates 保持快速，同時把舊回歸錯誤定位到 source/provider、book governance、dashboard 或 closure 類別；不改景氣判讀邏輯，也不輸出 formal current/candidate phase。
      current_status_zh: 已有 declared state、legal next phase、phase evidence profiles、official source wiring、coverage matrix、indicator detail cards、boom-to-recession surface、全循環 transition lane templates、continuity surface、24 個 major-group profiles、Phase62 drill-down、Phase63 latest evidence HTML page，以及 Phase64 method/chart payload；仍未啟用 formal current/candidate phase。
      remaining_gap_zh: 還需要 governed declared boom start date、更多 actual numeric cache/user input、真實圖表資料覆蓋率、transition timing replay preview 與 production migration gate。
      completed_summary_zh: 已完成 declared cycle state、legal next phase、phase evidence profiles、official source wiring、coverage matrix、39-role indicator detail cards、boom-to-recession transition surface、四個合法 transition lane templates、資料新鮮度/發布時點/目前值連續性 surface、24 個 major-group readiness profiles、dashboard drill-down artifact、latest evidence HTML page，以及診斷方法/圖表 payload。
      incomplete_summary_zh: 尚未完成 formal current/candidate phase gate、declared boom 起始日治理、授權私有資料讀取、更多 actual numeric values、真實 chart coverage、transition timing replay preview 與 production migration。
      next_gap_zh: 補 transition timing replay preview 與更多 actual numeric cache，讓目前 evidence 不只可解釋，也能看見時序累積。
      decrease_reason_zh:
