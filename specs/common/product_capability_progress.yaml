      current_status_zh: 指標意涵、來源、替代程度、風險標籤、value context、freshness、release timing、why-not-evidence、lineage、next gap、transition attribution、continuity gap explanation、major-group readiness explanation 與 role drill-down 已能以 research surface 呈現。
      remaining_gap_zh: 需要更多 numeric values、授權私有來源讀取、governed phase-age context、transition timing replay preview，以及最後 production renderer rehearsal。
      completed_summary_zh: 已完成指標意涵、來源身份、替代程度、data-risk labels、why-not-formal、lineage、value/freshness/release context、39-role detail cards、transition lane attribution、freshness/release/value continuity gap explanation、24 個 major-group attribution profiles，以及 dashboard-to-role drill-down。
      incomplete_summary_zh: 尚未完成所有 numeric values、授權私有來源讀取、governed phase-age context、transition timing replay preview 與最後 production renderer rehearsal。
      next_gap_zh: 補 transition timing replay preview，讓解釋能力從單期 drill-down 延伸到 evidence 時間軸。
