      previous_progress_percent: 99
      current_progress_percent: 99
      phase_delta_percent: 0
      phase_impacted: true
      phase_impact_zh: Phase73 將 dashboard 指標卡的 method 名稱展開為診斷計算配方，讓景氣階段判讀相關指標能顯示資料需求、頻率處理、視窗、方向判讀、信心下調與計算步驟；不新增 phase selector。
      current_status_zh: 已有 declared state、legal next phase、phase evidence profiles、official source wiring、coverage matrix、indicator detail cards、boom-to-recession surface、全循環 transition lane templates、continuity surface、24 個 major-group profiles、latest evidence HTML page、YTD/1Y/5Y chart payload、transition timing replay preview、declared phase-start handoff、37-role numeric/chart coverage，以及 Phase73 dashboard method explanation；仍未啟用 formal current/candidate phase。
      remaining_gap_zh: 還需要使用者提供並確認 declared boom 精確起始日或區間，將 fixture/cache connectivity 換成真實 local current cache coverage，並補 transition confirmation 條件。
      completed_summary_zh: 已完成 declared cycle state、legal next phase、phase evidence profiles、official source wiring、coverage matrix、39-role indicator detail cards、boom-to-recession transition surface、四個合法 transition lane templates、資料新鮮度/發布時點/目前值連續性 surface、24 個 major-group readiness profiles、dashboard drill-down artifact、latest evidence HTML page、診斷方法/圖表 payload、transition timing replay preview、phase-start confirmation/gate handoff、37-role current numeric/chart fixture coverage，以及 dashboard method recipe explanation。
      incomplete_summary_zh: 尚未完成使用者確認的 declared boom 起始日或起始區間 canonical registry 寫入、formal current/candidate phase gate、授權私有資料讀取、真實 current cache 全覆蓋、transition confirmation 操作規則與正式遷移。
      next_gap_zh: 將 dashboard method explanation 與 Phase72 fixture coverage 接到真實 local current cache refresh，並把 2 個授權或私有資料缺口維持為 visible risk。
      decrease_reason_zh:
