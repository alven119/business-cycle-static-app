    將 declared state、legal next transition、support/contradiction、
    missing evidence 與 why-not-formal 整理成 dashboard 可呈現的產品敘事。
    本 contract 只說明既有 declared registry 與 evidence readiness，不新增
    classifier、rank、winner、phase selector、allocation 或 trade output。
