test_suite_index:
  contract_id: test_suite_index_v1
  contract_version: "1.0"
  phase_id: 68
  status: active_test_governance_contract
  objective_zh: >
    建立測項索引，讓新增測試前可以先查找相同或相近測項。若已有相似測項，
    優先擴充既有測項範圍；若有重複測項，不新增。此索引不改 pytest
    default product-core suite，不放寬 safety scan，也不刪除 archive regression。
  index_sources:
    - tests/test_*.py
    - src/business_cycle/audits/test_suite_doctrine_quarantine.py
    - specs/common/test_suite_reduction_plan.yaml
  new_test_preflight_policy:
    - search_existing_test_names_and_component_area_first
    - prefer_extending_existing_related_test_file
    - create_new_test_file_only_for_new_contract_or_new_surface
    - add_marker_index_entry_or_allow_dynamic_archive_marker
    - keep_default_product_core_file_count_at_or_below_30
  duplicate_guard_policy:
    duplicate_guard_key_fields:
      - suite_tier
      - component_area
      - test_intent
      - test_path
    exact_duplicate_action: reject_new_duplicate
    similar_test_action: extend_existing_scope_when_possible
  hard_gates:
    test_suite_index_ready: true
    indexed_test_file_count_equals_discovered: true
    default_product_core_test_file_count: 29
    default_product_core_indexed_count: 29
    duplicate_test_guard_key_count: 0
    new_test_preflight_policy_ready: true
    similar_test_extension_policy_ready: true
    product_capability_mapping_complete: true
    production_behavior_change_count: 0
    semantic_drift_count: 0
