nas_service_lifecycle_contract:
  version: "1.0"
  status: active_research_contract
  phase_id: 98
  phase_label: nas_local_service_lifecycle_rehearsal_no_live_bind
  depends_on:
    - specs/common/nas_asgi_adapter_contract.yaml
    - specs/common/product_capability_progress.yaml
    - docs/nas_dynamic_service_architecture.md
  service_scope:
    target_runtime: private_nas_dynamic_service
    lifecycle_rehearsal_allowed: true
    in_process_only: true
    asgi_adapter_dependency_required: true
    startup_event_rehearsal_allowed: true
    readiness_probe_allowed: true
    shutdown_event_rehearsal_allowed: true
    rollback_rehearsal_allowed: true
    uvicorn_run_allowed_now: false
    network_bind_allowed_now: false
    live_server_start_allowed_now: false
    live_db_connection_allowed_now: false
    postgres_read_allowed_now: false
    postgres_write_allowed_now: false
    live_fetch_allowed_now: false
    public_output_allowed_now: false
    frontend_database_access_allowed: false
    frontend_api_key_allowed: false
  lifecycle_policy:
    lifecycle_stages:
      - startup
      - readiness
      - shutdown
      - rollback
    startup_steps:
      - load_lifecycle_contract
      - validate_phase97_asgi_dependency
      - construct_in_process_asgi_adapter
      - register_local_mount_only_health
    readiness_probe_paths:
      - /
      - /indicators
      - /api/indicator-snapshot.json
      - /api/service-status.json
      - /api/indicator-index.json
    readiness_probe_method: GET
    readiness_success_status_code: 200
    service_health_status: ready_for_local_mount_only
    shutdown_steps:
      - drain_in_process_requests
      - close_noop_resources
      - mark_shutdown_rehearsed
    rollback_steps:
      - disable_future_service_entrypoint
      - retain_phase96_app_shell_static_fallback
      - preserve_no_db_write_policy
      - preserve_no_public_output_policy
    production_service_ready: false
    production_auth_ready: false
  allowed_uses:
    - private_nas_service_lifecycle_rehearsal
    - fastapi_mount_lifecycle_shape_review
    - local_in_process_readiness_probe_smoke
    - rollback_checklist_review
  prohibited_uses:
    - public_hosted_dashboard
    - production_auth
    - live_server
    - live_postgres_read
    - live_postgres_write
    - live_macro_fetch
    - strict_point_in_time_result
    - formal_current_phase_decision
    - candidate_phase_selection
    - personalized_portfolio_instruction
    - trade_action
  prohibited_fields:
    - current_phase
    - candidate_phase
    - selected_phase
    - winning_phase
    - phase_rank
    - phase_score
    - target_weight
    - allocation_recommendation
    - buy_signal
    - sell_signal
    - trade_action
  hard_gates:
    nas_service_lifecycle_contract_ready: true
    nas_service_lifecycle_ready: true
    lifecycle_rehearsal_ready: true
    phase97_asgi_dependency_ready: true
    startup_rehearsed: true
    readiness_probe_ready: true
    shutdown_rehearsed: true
    rollback_rehearsal_ready: true
    lifecycle_stage_count: 4
    lifecycle_event_count: 16
    startup_step_count: 4
    readiness_probe_count: 5
    readiness_probe_pass_count: 5
    shutdown_step_count: 3
    rollback_step_count: 4
    service_health_status: ready_for_local_mount_only
    uvicorn_run_attempt_count: 0
    network_bind_attempt_count: 0
    live_server_start_attempt_count: 0
    live_db_connection_attempt_count: 0
    postgres_read_attempt_count: 0
    postgres_write_attempt_count: 0
    live_fetch_attempt_count: 0
    repo_output_written_count: 0
    public_output_count: 0
    frontend_database_access_allowed: false
    frontend_api_key_allowed: false
    prohibited_output_field_count: 0
    candidate_phase_emitted: false
    current_phase_emitted: false
    current_data_used_to_infer_declared_phase_count: 0
    standalone_classifier_added_count: 0
