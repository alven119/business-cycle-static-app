nas_tailscale_private_https_contract:
  version: "1.0"
  status: active_private_https_acceptance_contract
  phase_id: 109
  phase_label: nas_tailscale_private_https_acceptance
  depends_on:
    - specs/audits/phase108_nas_container_manager_live_start_closure.yaml
    - src/business_cycle/service/nas_runtime_server.py
    - docs/nas_dynamic_service_architecture.md
  observed_live_state:
    observed_at: "2026-07-10"
    observation_mode: redacted_operator_and_codex_live_smoke
    app_container_healthy: true
    postgres_container_healthy: true
    postgres_business_table_count: 0
    tailscale_backend_state: Running
    tailscale_online: true
    tailscale_installed_version: 1.58.2
    tailscale_peer_count: 1
    tailscale_online_peer_count: 0
    tailscale_serve_configured: false
    tailscale_funnel_configured: false
    mobile_cellular_smoke_passed: false
    tailnet_ip_or_dns_committed: false
  target_private_access:
    access_mode: tailscale_serve_private_https
    serve_target: http://127.0.0.1:18080
    serve_protocol: https
    app_host_publish: 127.0.0.1:18080:8000
    magic_dns_required: true
    public_funnel_allowed: false
    public_router_port_forward_allowed: false
    direct_lan_port_retained_after_acceptance: false
  runtime_hardening:
    secure_cookie_env: BUSINESS_CYCLE_APP_SECURE_COOKIE
    secure_cookie_required_after_https_activation: true
    http_only_cookie_required: true
    same_site_cookie_policy: Strict
    login_max_failures_default: 5
    login_window_seconds_default: 300
    login_request_max_bytes: 4096
    required_security_headers:
      - Content-Security-Policy
      - Referrer-Policy
      - X-Content-Type-Options
      - X-Frame-Options
      - Strict-Transport-Security
    hsts_required_after_https_activation: true
  operator_acceptance_steps:
    - review_and_update_tailscale_stable
    - grant_tailscale_operator_permission_to_deployment_account
    - enable_tailnet_https_and_tailscale_serve
    - configure_serve_target_loopback_18080
    - confirm_funnel_disabled
    - review_tailnet_grants_for_private_https_only
    - review_dsm_firewall_tailscale_subnet_if_enabled
    - review_server_key_expiry_policy
    - enable_secure_cookie_environment
    - republish_app_port_as_loopback_only
    - verify_https_health_ready_login_logout
    - verify_mobile_cellular_login_with_wifi_disabled
  acceptance_report:
    report_mode: operator_attested_tailscale_private_https
    required_boolean_fields:
      - tailscale_update_reviewed
      - tailscale_operator_permission_ready
      - tailscale_serve_enabled
      - tailscale_https_enabled
      - funnel_disabled
      - grants_reviewed
      - firewall_reviewed
      - key_expiry_policy_reviewed
      - app_loopback_only
      - secure_cookie_enabled
      - https_healthz_passed
      - https_readyz_passed
      - https_login_passed
      - https_logout_passed
      - mobile_cellular_smoke_passed
      - no_public_exposure_confirmed
    required_text_fields:
      - report_id
      - report_mode
      - serve_target
    expected_serve_target: http://127.0.0.1:18080
    accepted_status: accepted_private_https
    missing_status: operator_enable_serve_and_mobile_smoke_required
    repo_storage_allowed: false
  product_readiness_rebaseline:
    required: true
    status: pending_private_https_and_live_db_acceptance
    reasons:
      - postgres_business_schema_not_migrated
      - dashboard_live_db_read_not_enabled
      - tailscale_private_https_not_accepted
    percentage_change_allowed_now: false
  allowed_uses:
    - private_tailnet_https_activation
    - mobile_browser_acceptance
    - runtime_login_security_validation
    - production_readiness_rebaseline_disclosure
  prohibited_uses:
    - tailscale_funnel_public_exposure
    - public_router_port_forward
    - secret_or_tailnet_identity_commit
    - automatic_current_phase_inference
    - candidate_phase_selection
    - personalized_portfolio_instruction
    - trade_action
  prohibited_fields:
    - current_phase
    - candidate_phase
    - selected_phase
    - winning_phase
    - phase_rank
    - phase_score
    - target_weight
    - allocation_recommendation
    - buy_signal
    - sell_signal
    - trade_action
    - password
    - token
    - tailnet_ip
    - tailnet_dns_name
  hard_gates:
    nas_tailscale_private_https_contract_ready: true
    phase108_dependency_ready: true
    runtime_https_cookie_contract_ready: true
    runtime_login_rate_limit_ready: true
    runtime_security_headers_ready: true
    tailscale_live_state_reconciled: true
    tailscale_backend_online_observed: true
    tailscale_serve_configured: false
    tailscale_funnel_configured: false
    mobile_cellular_smoke_passed: false
    sample_acceptance_report_valid: true
    private_https_acceptance_status: operator_enable_serve_and_mobile_smoke_required
    private_https_accepted: false
    operator_action_required: true
    production_readiness_rebaseline_required: true
    production_readiness_rebaseline_reason_count: 3
    product_progress_percentage_change_count: 0
    public_exposure_enabled: false
    secure_value_committed_count: 0
    candidate_phase_emitted: false
    current_phase_emitted: false
    standalone_classifier_added_count: 0
    phase_rank_or_score_added_count: 0
    production_behavior_change_count: 0
    semantic_drift_count: 0
    development_next_phase: PHASE_109_OPERATOR_ACCEPTANCE
