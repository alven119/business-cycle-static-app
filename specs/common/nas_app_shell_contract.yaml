nas_app_shell_contract:
  version: "1.0"
  status: active_research_contract
  phase_id: 96
  phase_label: nas_app_shell_local_service_smoke
  depends_on:
    - specs/common/nas_service_dashboard_contract.yaml
    - specs/common/product_capability_progress.yaml
    - docs/nas_dynamic_service_architecture.md
  service_scope:
    target_runtime: private_nas_dynamic_service
    app_shell_allowed: true
    local_service_smoke_allowed: true
    in_process_dispatch_only: true
    network_bind_allowed_now: false
    live_server_start_allowed_now: false
    live_db_connection_allowed_now: false
    postgres_write_allowed_now: false
    live_fetch_allowed_now: false
    public_output_allowed_now: false
    frontend_database_access_allowed: false
    frontend_api_key_allowed: false
  auth_policy:
    auth_boundary_required: true
    session_header_name: X-Local-NAS-Session
    local_smoke_session_marker: local-dev-research-session
    production_secret_embedded: false
    unauthenticated_requests_rejected: true
    auth_is_production_ready: false
  route_policy:
    route_count: 5
    routes:
      - route_id: nas_dashboard_overview
        path: /
        method: GET
        output_kind: html
      - route_id: nas_indicator_index
        path: /indicators
        method: GET
        output_kind: html
      - route_id: nas_indicator_snapshot_api
        path: /api/indicator-snapshot.json
        method: GET
        output_kind: json
      - route_id: nas_service_status_api
        path: /api/service-status.json
        method: GET
        output_kind: json
      - route_id: nas_indicator_index_api
        path: /api/indicator-index.json
        method: GET
        output_kind: json
  rollback_policy:
    rollback_checklist_required: true
    rollback_checklist:
      - stop_private_nas_service
      - restore_previous_git_checkout
      - keep_postgres_data_volume_read_only
      - validate_no_public_route_exposure
      - rerun_local_service_smoke
      - inspect_service_health_payload
  allowed_uses:
    - private_nas_app_shell_rehearsal
    - local_in_process_service_smoke
    - auth_boundary_contract_review
    - rollback_checklist_review
  prohibited_uses:
    - public_hosted_dashboard
    - production_auth
    - live_postgres_write
    - live_macro_fetch
    - strict_point_in_time_result
    - formal_current_phase_decision
    - candidate_phase_selection
    - personalized_portfolio_instruction
    - trade_action
  prohibited_fields:
    - current_phase
    - candidate_phase
    - selected_phase
    - winning_phase
    - phase_rank
    - phase_score
    - target_weight
    - allocation_recommendation
    - buy_signal
    - sell_signal
    - trade_action
  hard_gates:
    nas_app_shell_contract_ready: true
    nas_app_shell_ready: true
    local_service_smoke_ready: true
    phase95_dashboard_dependency_ready: true
    auth_boundary_ready: true
    route_dispatch_ready: true
    service_health_ready: true
    rollback_checklist_ready: true
    route_count: 5
    session_required_route_count: 5
    authenticated_smoke_pass_count: 5
    unauthenticated_smoke_rejected_count: 5
    rollback_checklist_item_count: 6
    service_health_status: ok
    service_health_route_count: 5
    network_bind_attempt_count: 0
    live_server_start_attempt_count: 0
    live_db_connection_attempt_count: 0
    postgres_write_attempt_count: 0
    live_fetch_attempt_count: 0
    repo_output_written_count: 0
    public_output_count: 0
    frontend_database_access_allowed: false
    frontend_api_key_allowed: false
    prohibited_output_field_count: 0
    candidate_phase_emitted: false
    current_phase_emitted: false
    current_data_used_to_infer_declared_phase_count: 0
    standalone_classifier_added_count: 0
    phase_rank_or_score_added_count: 0
    role_count_voting_added_count: 0
    production_behavior_change_count: 0
    semantic_drift_count: 0
    development_next_phase: 97
