    mobile_first: true
    source_snapshot: phase94_nas_indicator_snapshot_materialization
    dry_run_output_under_tmp_only: true
    research_only_label_required: true
    revised_diagnostic_label_required: true
    pit_accounting_label_required: true
    prohibited_frontend_db_access: true
    prohibited_frontend_api_key: true
  allowed_uses:
    - private_nas_service_route_rehearsal
    - server_side_dashboard_renderer_rehearsal
    - indicator_snapshot_api_contract_review
    - mobile_research_dashboard_review
  prohibited_uses:
    - public_hosted_dashboard
    - live_postgres_write
    - live_macro_fetch
    - strict_point_in_time_result
    - formal_current_phase_decision
    - candidate_phase_selection
    - personalized_portfolio_instruction
    - trade_action
  prohibited_fields:
    - current_phase
    - candidate_phase
    - selected_phase
    - winning_phase
    - phase_rank
    - phase_score
    - target_weight
    - allocation_recommendation
    - buy_signal
    - sell_signal
    - trade_action
