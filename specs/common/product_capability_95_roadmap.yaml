product_capability_95_roadmap:
  version: "2.0"
  status: active_planning_contract
  baseline_phase_id: 75
  baseline_phase_label: all_capability_95_roadmap_reset_portfolio_research_baseline
  max_phase_count: 10
  planned_phase_count: 10
  target_phase_id: 84
  progress_semantics: >
    Percentages estimate distance to formal production use across all eight
    governed product capabilities. They are planning targets, not economic
    validation, investment advice, or a formal current phase decision. Planned
    percentages must be monotonic unless a future phase records a governed
    decrease reason.
  target_capabilities:
    - capability_id: C1_BUSINESS_CYCLE_PHASE_ASSESSMENT
      title_zh: 景氣階段判讀能力
      baseline_percent: 100
      target_percent: 100
      target_phase_id: 84
      production_use_definition_zh: >
        Dashboard preserves declared state, declared phase age, legal next
        phase, evidence profile, major-group readiness, abstention reasons,
        source risk, and confidence caveats without using a standalone selector.
      remaining_after_target_zh: >
        Continue preserving declared-state semantics while portfolio and replay
        layers mature.
      phase_targets:
        "75": 100
        "76": 100
        "77": 100
        "78": 100
        "79": 100
        "80": 100
        "81": 100
        "82": 100
        "83": 100
        "84": 100
    - capability_id: C2_TRANSITION_RISK_DETECTION
      title_zh: 轉折風險偵測能力
      baseline_percent: 99
      target_percent: 100
      target_phase_id: 84
      production_use_definition_zh: >
        Dashboard explains legal next transition watch and confirmation lanes,
        missing and contradictory evidence, freshness, source risk, and
        confidence caveats without rewriting declared state.
      remaining_after_target_zh: >
        Complete release accumulation and transition confirmation display while
        keeping state changes behind a governed gate.
      phase_targets:
        "75": 99
        "76": 99
        "77": 99
        "78": 99
        "79": 100
        "80": 100
        "81": 100
        "82": 100
        "83": 100
        "84": 100
    - capability_id: C3_EXPLAINABILITY_AND_ATTRIBUTION
      title_zh: 解釋能力
      baseline_percent: 100
      target_percent: 100
      target_phase_id: 84
      production_use_definition_zh: >
        Dashboard can drill down from declared state, transition surfaces,
        policy research, and replay/backtest artifacts to source, release
        timing, transformation, rule, provenance, data mode, data risk, and
        abstention reason.
      remaining_after_target_zh: >
        Extend the same explanation standard to portfolio and replay surfaces.
      phase_targets:
        "75": 100
        "76": 100
        "77": 100
        "78": 100
        "79": 100
        "80": 100
        "81": 100
        "82": 100
        "83": 100
        "84": 100
    - capability_id: C4_PORTFOLIO_POLICY_RESEARCH
      title_zh: Portfolio policy research 能力
      baseline_percent: 38
      target_percent: 95
      target_phase_id: 84
      production_use_definition_zh: >
        The system can present book and doctrine-aligned portfolio policy
        research templates, policy schedules, replay assumptions, costs,
        turnover, and caveats as research-only artifacts without current
        allocation guidance.
      remaining_after_target_zh: >
        Any stronger usage still requires an explicit future migration and
        operator review gate.
      phase_targets:
        "75": 45
        "76": 55
        "77": 65
        "78": 75
        "79": 78
        "80": 82
        "81": 88
        "82": 91
        "83": 93
        "84": 95
    - capability_id: C5_HISTORICAL_REPLAY_AND_BACKTEST
      title_zh: 歷史重播與回測能力
      baseline_percent: 54
      target_percent: 95
      target_phase_id: 84
      production_use_definition_zh: >
        The system can run governed research replay/backtest artifacts with
        strict/revised data-mode separation, transition timing, policy replay,
        cash-flow-aware assumptions, and provenance.
      remaining_after_target_zh: >
        External validation and production migration remain separate gates.
      phase_targets:
        "75": 58
        "76": 60
        "77": 65
        "78": 73
        "79": 80
        "80": 88
        "81": 90
        "82": 93
        "83": 94
        "84": 95
    - capability_id: C6_SAFE_OUTPUT_GOVERNANCE
      title_zh: 安全輸出治理能力
      baseline_percent: 94
      target_percent: 98
      target_phase_id: 84
      production_use_definition_zh: >
        All dashboard, replay, and portfolio research artifacts carry allowed
        uses, prohibited uses, source/data caveats, and forbidden-field gates.
      remaining_after_target_zh: >
        Stronger public or production migration requires a later explicit gate.
      phase_targets:
        "75": 95
        "76": 95
        "77": 96
        "78": 96
        "79": 97
        "80": 97
        "81": 98
        "82": 98
        "83": 98
        "84": 98
    - capability_id: F1_TEMPORAL_INTEGRITY_AND_ABSTENTION
      title_zh: 時間完整性與 abstention
      baseline_percent: 94
      target_percent: 98
      target_phase_id: 84
      production_use_definition_zh: >
        Replay/backtest and current dashboard surfaces preserve revised vs
        point-in-time distinctions, release timing, stale/missing handling, and
        abstention propagation.
      remaining_after_target_zh: >
        Exact-vintage coverage can continue improving after the product surface
        is ready.
      phase_targets:
        "75": 95
        "76": 95
        "77": 96
        "78": 96
        "79": 97
        "80": 97
        "81": 97
        "82": 98
        "83": 98
        "84": 98
    - capability_id: F2_MODEL_GOVERNANCE_AND_PROSPECTIVE_VALIDATION
      title_zh: 模型治理與前瞻驗證
      baseline_percent: 70
      target_percent: 95
      target_phase_id: 84
      production_use_definition_zh: >
        The system can show model lineage, replay/backtest provenance,
        migration rehearsal status, prospective wait state, and rollback-ready
        governance without claiming economic validation.
      remaining_after_target_zh: >
        Economic validation and prospective evidence accumulation remain future
        evidence requirements, not wording shortcuts.
      phase_targets:
        "75": 73
        "76": 75
        "77": 78
        "78": 81
        "79": 85
        "80": 88
        "81": 91
        "82": 93
        "83": 94
        "84": 95
  planned_phases:
    - phase_id: 75
      phase_title: All-capability roadmap reset and portfolio research baseline
      objective_zh: >
        將未來十個 phase 改成八項能力全數至少 95% 的路線，並建立
        portfolio policy research baseline contract，明確區分 research
        template、replay/backtest、current allocation guidance。
      capabilities_advanced:
        - C4_PORTFOLIO_POLICY_RESEARCH
        - C5_HISTORICAL_REPLAY_AND_BACKTEST
        - C6_SAFE_OUTPUT_GOVERNANCE
        - F1_TEMPORAL_INTEGRITY_AND_ABSTENTION
        - F2_MODEL_GOVERNANCE_AND_PROSPECTIVE_VALIDATION
      key_acceptance_gates:
        - all_capability_95_roadmap_ready=true
        - portfolio_policy_research_baseline_contract_ready=true
        - backtest_execution_count=0
    - phase_id: 76
      phase_title: Book benchmark portfolio policy templates
      objective_zh: >
        將 passive all-stock、stock/cash、stock/long Treasury、boom 70/50/30
        等模板具體化為 research-only template fixtures 與 validator。
      capabilities_advanced:
        - C4_PORTFOLIO_POLICY_RESEARCH
        - C6_SAFE_OUTPUT_GOVERNANCE
      key_acceptance_gates:
        - portfolio_policy_template_fixture_count>=8
        - current_allocation_recommendation_count=0
        - trade_signal_output_count=0
    - phase_id: 77
      phase_title: Portfolio policy replay schedule engine
      objective_zh: >
        建立 policy schedule replay engine，只輸出 research-only schedule
        artifact，不輸出目前配置、交易行動或 broker 指令。
      capabilities_advanced:
        - C4_PORTFOLIO_POLICY_RESEARCH
        - C5_HISTORICAL_REPLAY_AND_BACKTEST
        - C6_SAFE_OUTPUT_GOVERNANCE
      key_acceptance_gates:
        - portfolio_policy_replay_engine_ready=true
        - replay_artifact_research_only=true
        - current_allocation_recommendation_count=0
    - phase_id: 78
      phase_title: Cash-flow-aware backtest kernel
      objective_zh: >
        建立 cash-flow-aware research backtest kernel，支援年度投入、
        再平衡、成本、unitized NAV 與 drawdown 計算 contract。
      capabilities_advanced:
        - C4_PORTFOLIO_POLICY_RESEARCH
        - C5_HISTORICAL_REPLAY_AND_BACKTEST
        - C6_SAFE_OUTPUT_GOVERNANCE
      key_acceptance_gates:
        - cash_flow_aware_backtest_kernel_ready=true
        - generated_output_under_tmp_only=true
        - investment_advice_wording_count=0
    - phase_id: 79
      phase_title: Historical replay runner with strict/revised separation
      objective_zh: >
        將 transition evidence、declared state、policy schedule 與 data mode
        組成 governed historical replay runner，明確分離 revised diagnostic
        與 strict point-in-time。
      capabilities_advanced:
        - C2_TRANSITION_RISK_DETECTION
        - C5_HISTORICAL_REPLAY_AND_BACKTEST
        - F1_TEMPORAL_INTEGRITY_AND_ABSTENTION
      key_acceptance_gates:
        - historical_replay_runner_ready=true
        - revised_mislabeled_as_point_in_time_count=0
        - current_phase_emitted=false
    - phase_id: 80
      phase_title: Research-only backtest artifact generation
      objective_zh: >
        產生 research-only backtest artifacts，包含 policy replay、風險指標、
        caveats、input hashes 與 provenance，不寫 repo output。
      capabilities_advanced:
        - C4_PORTFOLIO_POLICY_RESEARCH
        - C5_HISTORICAL_REPLAY_AND_BACKTEST
        - C6_SAFE_OUTPUT_GOVERNANCE
      key_acceptance_gates:
        - research_backtest_artifact_count>0
        - prohibited_output_field_count=0
        - public_output_count=0
    - phase_id: 81
      phase_title: Portfolio and replay dashboard integration
      objective_zh: >
        將 portfolio policy research、historical replay、backtest artifacts
        接入 dashboard research surfaces，保留 caveats 與 drill-down lineage。
      capabilities_advanced:
        - C3_EXPLAINABILITY_AND_ATTRIBUTION
        - C4_PORTFOLIO_POLICY_RESEARCH
        - C5_HISTORICAL_REPLAY_AND_BACKTEST
      key_acceptance_gates:
        - portfolio_replay_dashboard_surface_ready=true
        - research_only_label_visible=true
        - current_allocation_recommendation_count=0
    - phase_id: 82
      phase_title: Replay/backtest reproducibility and provenance hardening
      objective_zh: >
        強化 replay/backtest 的 source hash、artifact lineage、freeze
        relation、input completeness 與 no-silent-fallback gates。
      capabilities_advanced:
        - C5_HISTORICAL_REPLAY_AND_BACKTEST
        - C6_SAFE_OUTPUT_GOVERNANCE
        - F1_TEMPORAL_INTEGRITY_AND_ABSTENTION
        - F2_MODEL_GOVERNANCE_AND_PROSPECTIVE_VALIDATION
      key_acceptance_gates:
        - replay_backtest_lineage_ready=true
        - input_hash_coverage_complete=true
        - silent_fallback_count=0
    - phase_id: 83
      phase_title: Governance migration rehearsal
      objective_zh: >
        建立 production migration rehearsal、rollback checklist、public
        output policy 與 prospective wait-state handoff；不自動打開 production。
      capabilities_advanced:
        - C6_SAFE_OUTPUT_GOVERNANCE
        - F2_MODEL_GOVERNANCE_AND_PROSPECTIVE_VALIDATION
      key_acceptance_gates:
        - migration_rehearsal_ready=true
        - rollback_checklist_ready=true
        - production_behavior_change_count=0
    - phase_id: 84
      phase_title: All-capability 95 percent readiness review
      objective_zh: >
        統整八項能力表、dashboard/replay/portfolio artifacts、governance
        gates 與剩餘 external blockers，確認所有能力至少達 95% 或明確
        列出不能由程式安全補齊的外部限制。
      capabilities_advanced:
        - C1_BUSINESS_CYCLE_PHASE_ASSESSMENT
        - C2_TRANSITION_RISK_DETECTION
        - C3_EXPLAINABILITY_AND_ATTRIBUTION
        - C4_PORTFOLIO_POLICY_RESEARCH
        - C5_HISTORICAL_REPLAY_AND_BACKTEST
        - C6_SAFE_OUTPUT_GOVERNANCE
        - F1_TEMPORAL_INTEGRITY_AND_ABSTENTION
        - F2_MODEL_GOVERNANCE_AND_PROSPECTIVE_VALIDATION
      key_acceptance_gates:
        - all_capabilities_at_least_95=true
        - unresolved_external_blockers_documented=true
        - investment_advice_wording_count=0
  prior_enablers:
