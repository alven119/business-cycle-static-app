transition_evidence_badge_display_fixtures:
  version: 1
  status: draft
  schema_path: specs/common/transition_evidence_badge_schema.yaml
  badge_fixtures_path: specs/common/transition_evidence_badge_fixtures.yaml
  renderer_contract_path: specs/common/transition_evidence_badge_renderer_contract.yaml
  objective_zh: >
    提供 transition evidence badge renderer display model 的合法與非法樣本，
    用於驗證 future dashboard renderer 的安全輸入/輸出 contract，
    確保 display model 不包含正式決策、投資行動、phase override 或 prohibited text。
  caveats_zh:
    - 此為 renderer display model fixtures，不代表 dashboard 已接入。
    - display model 僅供 diagnostics display。
    - display model 不會改變 current_phase_id。
    - display model 不會改變 decision_status。
    - watch 類訊號不是買賣訊號。
    - 不構成投資建議。

  valid_display_models:
    - fixture_id: valid_recession_confirmation_watch_display
      display_model:
        family_id: recession_confirmation
        level: watch
        display_name_zh: 衰退確認證據
        summary_zh: 衰退候選證據升高，但不代表正式階段切換。
        confidence: 0.72
        evidence_date: "2008-10-31"
        diagnostics_only: true
        formal_decision_impact: none
        caveats_zh:
          - 此為 experimental recession evidence。
          - 不代表正式景氣階段切換。
          - 不構成投資建議。
          - experimental diagnostics，不代表正式階段切換。
          - watch 不是買賣訊號。
        score: 78.5
        top_contributors:
          - credit_spread_baa_aaa
          - continuing_jobless_claims
        warning_flags:
          - experimental_evidence
        badge_css_class: evidence-badge evidence-badge--recession-confirmation evidence-badge--medium
        badge_level_label_zh: 衰退確認觀察
        badge_family_label_zh: 衰退確認證據
        display_caveat_summary_zh: experimental diagnostics，不代表正式階段切換。 watch 不是買賣訊號。 不構成投資建議。

