indicator_dashboard_explanation_drilldown:
  contract_id: indicator_dashboard_explanation_drilldown_v1
  contract_version: "1.0"
  phase_id: "62"
  phase_label: indicator_to_dashboard_explanation_drill_down
  status: active_research_view_model_contract
  objective_zh: >
    將 dashboard 的 major-group profile 與 indicator detail cards 串成
    research-only explanation drill-down，讓使用者能從群組一路追溯到
    role、source、release timing、freshness、transformation、rule/usability、
    provenance、data mode 與 abstention reason。
  dependencies:
    - indicator_detail_source_risk_value_rendering_v1
    - evidence_freshness_release_value_continuity_v1
    - major_group_evidence_profile_readiness_v1
  policy:
    output_mode: research_only_indicator_dashboard_explanation_drilldown
    research_only: true
    current_phase_inference_enabled: false
    candidate_phase_selection_enabled: false
    production_behavior_change: false
    missing_value_treated_as_neutral: false
    metadata_only_promoted_to_phase_support: false
    supporting_proxy_can_replace_book_core: false
  required_role_drilldown_fields:
    - role_id
    - phase_or_layer
    - major_group_id
    - source_detail
    - release_timing_detail
    - freshness_detail
    - transformation_detail
    - rule_or_usability_detail
    - provenance_detail
    - data_mode_detail
    - abstention_reason_detail
    - dashboard_explanation_zh
    - drilldown_href
  dashboard_view_model:
    view_id: indicator_dashboard_explanation_drilldown
    allowed_uses:
      - local_research_dashboard
      - indicator_explanation_drilldown
      - source_release_transformation_review
      - abstention_reason_review
      - data_lineage_review
    prohibited_uses:
      - formal_current_phase_decision
      - candidate_phase_selection
      - phase_score_or_rank_selection
      - production_decision
      - portfolio_or_trade_decision
  hard_gates:
    indicator_dashboard_explanation_drilldown_ready: true
    major_group_drilldown_count: 24
