validation_harness_contract:
  harness_id: book_faithful_shadow_validation_harness_v1
  harness_version: phase16_v1
  harness_status: scaffolded_synthetic_dry_run_only
  parent_validation_protocol_id: book_faithful_shadow_economic_validation_protocol_v1
  parent_freeze_id: book_faithful_shadow_v2_alpha11
  allowed_inputs:
    - economic_validation_protocol_contract
    - validation_readiness_registry
    - frozen_shadow_artifact_manifests
    - synthetic_validation_harness_fixtures
  prohibited_inputs:
    - historical_scenario_results
    - expected_phase_labels
    - nber_dates
    - portfolio_returns
    - prospective_registry_results
    - production_current_phase
    - candidate_phase_output
    - current_phase_output
  allowed_data_modes:
    - synthetic_fixture
  prohibited_data_modes_for_this_phase:
    - vintage_as_of
    - revised
    - live
    - prospective_registry
  required_frozen_artifacts:
    - book_faithful_shadow_v2_alpha11
    - book_faithful_shadow_v2_alpha10
    - economic_validation_protocol_contract
    - validation_readiness_registry
  synthetic_fixture_policy:
    fixture_mode: synthetic
    fixture_required: true
    real_history_allowed: false
    fixture_claim_scope: mechanics_only
  structural_validation_checks:
    - check_id: protocol_contract_present
      expected: true
    - check_id: parent_freeze_present
      expected: true
    - check_id: no_validation_execution_guard
      expected: true
    - check_id: non_emitting_output_guard
      expected: true
  artifact_schema_checks:
    - check_id: required_allowed_outputs_present
      expected: true
    - check_id: forbidden_outputs_absent
      expected: true
    - check_id: trust_metadata_present
      expected: true
  leakage_guard_checks:
    - check_id: no_historical_result_inputs
      expected: true
    - check_id: no_metric_computation
      expected: true
    - check_id: no_candidate_or_current_phase_output
      expected: true
  allowed_outputs:
    - harness_run_id
    - harness_version
    - dry_run_mode
    - structural_check_results
    - artifact_schema_check_results
    - fixture_check_results
    - blocked_reason_codes
    - allowed_uses
    - prohibited_uses
    - trust_metadata
    - metric_computation_enabled
    - backtest_execution_enabled
    - holdout_registered
    - candidate_phase_emitted
    - current_phase_emitted
  forbidden_outputs:
    - historical_accuracy
    - economic_performance
    - portfolio_return
    - confusion_matrix
    - precision
    - recall
    - hit_rate
    - CAGR
    - drawdown
    - Sharpe
    - candidate_phase
    - current_phase
    - selected_phase
    - phase_score
    - phase_probability
    - buy_signal
    - sell_signal
    - target_weight
    - trade_action
  output_restrictions:
    dry_run_mode: synthetic_only
    historical_accuracy_metric_count: 0
    economic_performance_metric_count: 0
    candidate_selection_enabled: false
    candidate_phase_emitted: false
    current_phase_emitted: false
    public_output_written: false
    data_backtests_write_allowed: false
    data_prospective_write_allowed: false
  metric_computation_policy:
    metric_computation_enabled: false
    accuracy_metrics_allowed: false
    economic_performance_metrics_allowed: false
  backtest_execution_policy:
    backtest_execution_enabled: false
    portfolio_return_computation_allowed: false
  holdout_policy:
    holdout_registered: false
    holdout_record_creation_allowed: false
  prospective_policy:
    prospective_result_inspection_allowed: false
    prospective_registry_record_count: 0
    prospective_registry_write_attempt_count: 0
  candidate_output_policy:
    candidate_selection_enabled: false
    candidate_phase_emitted: false
    current_phase_emitted: false
  production_isolation_policy:
    production_behavior_change_count: 0
    production_import_allowed: false
    workflow_integration_allowed: false
    public_output_allowed: false
  readiness_gates:
    validation_harness_contract_ready: true
    synthetic_dry_run_allowed: true
    real_historical_validation_allowed: false
    economic_validation_allowed: false
    backtest_execution_allowed: false
  disabled_runtime_guards:
    real_historical_validation_executed: false
    metric_computation_enabled: false
    backtest_execution_enabled: false
    holdout_registered: false
    candidate_selection_enabled: false
    candidate_phase_emitted: false
    current_phase_emitted: false
    numeric_weight_added: false
    arbitrary_threshold_added: false
    role_count_voting_added: false
    historical_tuning_used: false
    production_integration_allowed: false
    data_backtests_write_allowed: false
    data_prospective_write_allowed: false
    public_output_allowed: false
