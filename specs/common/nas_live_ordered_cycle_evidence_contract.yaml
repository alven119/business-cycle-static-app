nas_live_ordered_cycle_evidence_contract:
  version: "1.0"
  status: active_private_nas_research_runtime
  phase_id: 123
  phase_label: live_ordered_cycle_evidence_and_transition_runtime
  declared_state_policy:
    declared_current_phase: boom
    legal_next_phase: recession
    current_data_may_infer_declared_phase: false
    declared_registry_auto_write_allowed: false
  input_policy:
    source_mode: live_postgres_read_only
    data_mode: revised_diagnostic
    same_as_of_required: true
    future_observation_allowed: false
    missing_value_behavior: explicit_abstention
    stale_value_behavior: explicit_abstention
    unavailable_value_behavior: explicit_abstention
    missing_value_is_neutral: false
    missing_value_is_zero: false
  role_evaluators:
    boom_claims_u_shape:
      required_series_ids: [ICSA]
      transform_profile_id: trailing_4_observation_mean
      evaluator_type: turning_point
      expected_direction: up
      lane_ids: [boom_ending_watch, recession_watch]
      interpretation_zh: 先以 4 期平均降低每週雜訊，再檢查低檔後轉升；平滑本身不是風險證據。
    boom_retail_sales_vs_broad_pce:
      required_series_ids: [RRSFS, PCEC96]
      transform_profile_id: year_over_year_percent_change
      evaluator_type: component_consistency
      expected_direction: down
      lane_ids: [boom_continuation, boom_ending_watch]
      interpretation_zh: 實質零售與廣義實質消費年增率必須分開評估；同步走弱才支持 ending watch，mixed 不得被平均消除。
    boom_private_investment:
      required_series_ids: [FPIC1]
      transform_profile_id: year_over_year_percent_change
      evaluator_type: direction
      expected_direction: down
      lane_ids: [boom_continuation, boom_ending_watch]
      interpretation_zh: 實質民間固定投資年增率走弱支持 ending watch；走強則支持 boom continuation 脈絡。
    recession_employment_confirmation:
      required_series_ids: [CCSA]
      transform_profile_id: trailing_4_observation_mean
      evaluator_type: direction
      expected_direction: up
      lane_ids: [recession_confirmation]
      interpretation_zh: 續領失業救濟金 4 期平均走升代表較持續的就業壓力，但不能單獨確認衰退。
    recession_consumption_confirmation:
      required_series_ids: [PCEC96]
      transform_profile_id: year_over_year_percent_change
      evaluator_type: direction
      expected_direction: down
      lane_ids: [recession_confirmation]
      interpretation_zh: 廣義實質個人消費年增率走弱是消費確認輸入；必須和就業確認共同存在。
  lane_policy:
    boom_continuation:
      lane_type: continuation_context
      required_role_ids: [boom_retail_sales_vs_broad_pce, boom_private_investment]
      confirmation_allowed: false
    boom_ending_watch:
      lane_type: transition_watch
      required_role_ids: [boom_claims_u_shape, boom_retail_sales_vs_broad_pce, boom_private_investment]
      confirmation_allowed: false
    recession_watch:
      lane_type: transition_watch
      required_role_ids: [boom_claims_u_shape]
      confirmation_allowed: false
    recession_confirmation:
      lane_type: transition_confirmation
      required_role_ids: [recession_employment_confirmation, recession_consumption_confirmation]
      all_required_roles_must_be_supportive: true
      confirmation_changes_declared_state: false
  output_policy:
    output_mode: research_only_private_nas_live_ordered_cycle_evidence
    watch_is_confirmation: false
    evidence_changes_declared_state: false
    candidate_phase_emission_allowed: false
    current_phase_emission_allowed: false
    numeric_weight_allowed: false
    arbitrary_threshold_allowed: false
    role_count_voting_allowed: false
  hard_gates:
    live_ordered_cycle_evidence_contract_ready: true
    live_evidence_evaluator_connected: true
    evaluated_role_count: 5
    lane_output_count: 4
    watch_confirmation_separation_verified: true
    phase_presence_transition_separation_valid: true
    declared_state_and_legal_transition_preserved: true
    transformed_input_contract_count: 5
    raw_value_promoted_to_evidence_count: 0
    smoothing_alone_promoted_to_evidence_count: 0
    missing_value_treated_as_neutral_count: 0
    missing_value_treated_as_zero_count: 0
    watch_promoted_to_confirmation_count: 0
    candidate_phase_emitted: false
    current_phase_emitted: false
    standalone_classifier_added_count: 0
    phase_rank_or_score_added_count: 0
    role_count_voting_added_count: 0
    arbitrary_threshold_added_count: 0
    numeric_weight_added_count: 0
    production_behavior_change_count: 0
    semantic_drift_count: 0
