portfolio_policy_replay_research_surface:
  version: 1
  status: active_research_surface_no_execution
  phase_id: 88
  view_id: portfolio_policy_replay_research_surface
  view_model_version: phase88_portfolio_policy_replay_research_surface_v1
  objective_zh: >
    將既有 portfolio policy template、policy replay schedule、cash-flow kernel
    與 research-only backtest artifacts 收斂成 dashboard-ready research surface。
    此 surface 只讓使用者理解各模板如何在未來 replay/backtest 中被研究，
    不執行 policy replay、不計算績效、不輸出目前配置或交易動作。
  dependencies:
    portfolio_policy_research_baseline: specs/portfolio/portfolio_policy_research_baseline_contract.yaml
    portfolio_policy_template_schema: specs/portfolio/portfolio_policy_template_schema.yaml
    portfolio_policy_template_fixtures: specs/portfolio/portfolio_policy_template_fixtures.yaml
    portfolio_policy_replay_schedule: specs/portfolio/portfolio_policy_replay_schedule_contract.yaml
    cash_flow_backtest_kernel_contract: specs/portfolio/cash_flow_backtest_kernel_contract.yaml
    research_backtest_artifacts: specs/audits/research_backtest_artifacts.yaml
    portfolio_replay_dashboard_surface: specs/common/portfolio_replay_dashboard_surface.yaml
  allowed_inputs:
    - policy_template_contract_rows
    - policy_replay_schedule_rows
    - cash_flow_kernel_contract_summary
    - research_backtest_artifact_metadata
    - declared_cycle_state_timeline_after_replay_gate
    - legal_transition_watch_or_confirmation_context
  prohibited_inputs:
    - current_private_holdings
    - brokerage_account_state
    - live_market_order
    - current_allocation_preference
    - portfolio_return_for_rule_tuning
    - historical_label_for_policy_rule_tuning
    - standalone_current_phase_classifier_output
    - phase_rank_or_winner
  required_sections:
    - template_catalog
    - replay_schedule_matrix
    - cost_turnover_assumption_panel
    - scenario_policy_coverage
    - safety_caveats
    - no_advice_validator_summary
  required_policy_templates:
    - passive_all_stock_baseline
    - stock_cash_initial
    - stock_cash_advanced
    - stock_long_treasury_initial
    - stock_long_treasury_advanced
    - boom_70_50_30_template
    - recession_defense_research_template
    - recovery_re_risk_research_template
  scenario_ids:
    - dotcom_cycle_2000_2003
    - global_financial_crisis_2007_2009
    - covid_recession_2020
    - euro_debt_slowdown_2011_2012
    - late_cycle_2018_2019
  output_policy:
    output_mode: research_only_dashboard_surface
    research_only_label: RESEARCH ONLY
    execution_allowed_now: false
    policy_replay_execution_allowed: false
    backtest_execution_allowed: false
    metric_value_computation_allowed: false
    current_allocation_recommendation_allowed: false
    trade_signal_allowed: false
    live_allocation_allowed: false
    public_output_allowed: false
    allowed_uses:
      - local_research_dashboard
      - portfolio_policy_template_review
      - replay_surface_review
      - caveat_review
    prohibited_uses:
      - current_allocation_guidance
      - production_decision
      - trade_instruction
      - performance_claim
      - public_output
  cost_turnover_assumption_policy:
    status: assumptions_visible_not_computed
    required_fields:
      - cost_assumption_policy
      - rebalance_clock_policy
      - turnover_status
      - false_signal_cost_status
      - missed_recovery_cost_status
    default_turnover_status: not_computed_research_surface_only
    default_false_signal_cost_status: not_computed_research_surface_only
    default_missed_recovery_cost_status: not_computed_research_surface_only
  prohibited_fields:
    - current_allocation
    - current_allocation_recommendation
    - target_weight
    - target_weights
    - buy_signal
    - sell_signal
    - trade_action
    - rebalance_now
    - live_allocation
    - portfolio_action
    - current_market_recommendation
    - selected_phase
    - winning_phase
    - phase_rank
    - standalone_phase_score
    - portfolio_return
    - sharpe
    - drawdown
    - CAGR
  renderer_caveats_zh:
    - Portfolio policy templates 只作為研究假設，不是目前配置建議。
    - Policy replay 尚未執行，成本、turnover 與績效值都未計算。
    - Watch 不等於 confirmation，transition evidence 不會直接觸發配置動作。
    - 所有權重語意只存在於 future backtest-only template，不得作為 live allocation。
    - Research dashboard surface 只可用於本機研究與審查，不自動寫 public。
    - 不得用 historical result、label 或 portfolio return 反推規則。
  disabled_runtime_guards:
    policy_replay_execution_enabled: false
    backtest_execution_enabled: false
    metric_value_computation_enabled: false
    current_allocation_recommendation_enabled: false
    live_allocation_enabled: false
    trade_signal_enabled: false
    candidate_phase_emission_enabled: false
    current_phase_emission_enabled: false
    production_integration_enabled: false
    public_output_enabled: false
  hard_gates:
    portfolio_policy_replay_research_surface_ready: true
    template_catalog_ready: true
    replay_schedule_matrix_ready: true
    cost_turnover_assumption_panel_ready: true
    scenario_policy_coverage_ready: true
    safety_caveat_panel_ready: true
    no_advice_validator_ready: true
    policy_template_count: 8
    replay_schedule_row_count: 8
    scenario_count: 5
    scenario_policy_coverage_row_count: 40
    cost_assumption_visible_count: 8
    turnover_status_visible_count: 8
    renderer_caveat_count: 6
    policy_replay_execution_count: 0
    backtest_execution_count: 0
    metric_value_count: 0
    economic_performance_metric_count: 0
    current_allocation_recommendation_count: 0
    trade_signal_output_count: 0
    prohibited_output_field_count: 0
    public_output_count: 0
    candidate_phase_emitted: false
    current_phase_emitted: false
    production_behavior_change_count: 0
    semantic_drift_count: 0
