      authentication_allowed: false
    - port_id: dsm_https
      port: 5001
      role: DSM HTTPS management endpoint reachability only
      authentication_allowed: false
    - port_id: http_plain
      port: 80
      role: optional reverse-proxy HTTP reachability only
      authentication_allowed: false
    - port_id: https_plain
