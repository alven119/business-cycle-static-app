name: business-cycle-research
services:
  macro_postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${MACRO_POSTGRES_DB:-business_cycle}
      POSTGRES_USER: ${MACRO_POSTGRES_USER:-business_cycle_app}
      POSTGRES_PASSWORD: ${MACRO_POSTGRES_PASSWORD}
    volumes:
      - macro_postgres_data:/var/lib/postgresql/data
      - macro_source_artifacts:/var/lib/business-cycle/source-artifacts:ro
    networks:
      - business_cycle_private
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}
      interval: 30s
      timeout: 5s
      retries: 5

  business_cycle_app:
    image: business-cycle-nas-app:phase131-historical-pit-events
    build:
      context: /volume2/docker/business-cycle/app
      dockerfile: Dockerfile.nas
    restart: unless-stopped
    depends_on:
      macro_postgres:
        condition: service_healthy
      macro_source_artifact_init:
        condition: service_completed_successfully
    environment:
      BUSINESS_CYCLE_SERVICE_MODE: private_nas_research
      BUSINESS_CYCLE_DATABASE_URL: ${BUSINESS_CYCLE_DATABASE_URL}
      BUSINESS_CYCLE_APP_SESSION_HEADER: ${BUSINESS_CYCLE_APP_SESSION_HEADER:-X-Business-Cycle-Session}
      BUSINESS_CYCLE_APP_SESSION_SECRET: ${BUSINESS_CYCLE_APP_SESSION_SECRET}
      BUSINESS_CYCLE_APP_SECURE_COOKIE: "true"
      BUSINESS_CYCLE_PRIVATE_LAN_HTTP_COOKIE_ALLOWED: "true"
      BUSINESS_CYCLE_PRIVATE_LAN_HOSTS: "192.168.1.116,192.168.1.116:18080"
      BUSINESS_CYCLE_LOGIN_MAX_FAILURES: "5"
      BUSINESS_CYCLE_LOGIN_WINDOW_SECONDS: "300"
      BUSINESS_CYCLE_PUBLIC_EXPOSURE: "false"
      BUSINESS_CYCLE_HEALTHCHECK_URL: http://127.0.0.1:8000/healthz
      BUSINESS_CYCLE_DASHBOARD_SHELL_TTL_SECONDS: "900"
      BUSINESS_CYCLE_PHASE_TRANSITION_ACTIVATION_ENABLED: "false"
      BUSINESS_CYCLE_REFRESH_STATUS_PATH: /var/lib/business-cycle/source-artifacts/phase112/refresh-status.json
      BUSINESS_CYCLE_DECLARED_CYCLE_STATE_PATH: /var/lib/business-cycle/cycle-state/declared_cycle_state_registry.yaml
      BUSINESS_CYCLE_SOURCE_OPERATIONS_STATUS_PATH: /var/lib/business-cycle/source-artifacts/phase115/operations-status.json
      BUSINESS_CYCLE_RELEASE_AWARE_SCHEDULE_STATUS_PATH: /var/lib/business-cycle/source-artifacts/phase116/schedule-status.json
      BUSINESS_CYCLE_PIT_BACKFILL_STATUS_PATH: /var/lib/business-cycle/source-artifacts/phase117/latest-backfill-report.json
      BUSINESS_CYCLE_BROADER_PIT_STATUS_PATH: /var/lib/business-cycle/source-artifacts/phase118/latest-broader-pit-report.json
      BUSINESS_CYCLE_STRICT_REPLAY_TIMELINE_STATUS_PATH: /var/lib/business-cycle/source-artifacts/phase119/latest-strict-replay-input-timeline.json
      BUSINESS_CYCLE_STRICT_REPLAY_BACKTEST_STATUS_PATH: /var/lib/business-cycle/source-artifacts/phase125/latest-strict-replay-backtest.json
      BUSINESS_CYCLE_V1_ACCEPTANCE_STATUS_PATH: /var/lib/business-cycle/source-artifacts/phase126/operational-acceptance.json
    ports:
      - "127.0.0.1:18080:8000"
      - "${BUSINESS_CYCLE_LAN_BIND_IP:-192.168.1.116}:18080:8000"
    networks:
      - business_cycle_private
    volumes:
      - macro_source_artifacts:/var/lib/business-cycle/source-artifacts:ro
      - cycle_state_config:/var/lib/business-cycle/cycle-state
    healthcheck:
      test:
        - CMD
        - python
        - -m
        - business_cycle.service.healthcheck
      interval: 30s
      timeout: 5s
      retries: 5

  macro_source_artifact_init:
    image: postgres:16-alpine
    user: "0:0"
    restart: "no"
    entrypoint:
      - sh
      - -c
    command:
      - mkdir -p /var/lib/business-cycle/source-artifacts/phase112 /var/lib/business-cycle/source-artifacts/phase118 /var/lib/business-cycle/source-artifacts/phase119 /var/lib/business-cycle/source-artifacts/phase125/runs /var/lib/business-cycle/source-artifacts/phase126 /var/lib/business-cycle/cycle-state && chown -R 1000:1000 /var/lib/business-cycle/source-artifacts /var/lib/business-cycle/cycle-state
    volumes:
      - macro_source_artifacts:/var/lib/business-cycle/source-artifacts
      - cycle_state_config:/var/lib/business-cycle/cycle-state
    network_mode: none

  macro_refresh_worker:
    image: business-cycle-nas-app:phase131-historical-pit-events
    build:
      context: /volume2/docker/business-cycle/app
      dockerfile: Dockerfile.nas
    restart: unless-stopped
    depends_on:
      macro_postgres:
        condition: service_healthy
      macro_source_artifact_init:
        condition: service_completed_successfully
    environment:
      BUSINESS_CYCLE_DATABASE_URL: ${BUSINESS_CYCLE_DATABASE_URL}
      BUSINESS_CYCLE_REFRESH_OPERATOR_CONFIRMATION: I_UNDERSTAND_THIS_FETCHES_FRED_AND_WRITES_NAS_POSTGRES
      BUSINESS_CYCLE_PIT_BACKFILL_OPERATOR_CONFIRMATION: I_UNDERSTAND_THIS_FETCHES_ALFRED_AND_WRITES_NAS_POSTGRES
      BUSINESS_CYCLE_PHASE118_OPERATOR_CONFIRMATION: I_UNDERSTAND_THIS_MIGRATES_CALENDAR_AND_WRITES_BROADER_ALFRED_PIT
      BUSINESS_CYCLE_TECHNOLOGY_REFRESH_ENABLED: "true"
      BUSINESS_CYCLE_TECHNOLOGY_REFRESH_OPERATOR_CONFIRMATION: I_UNDERSTAND_THIS_FETCHES_OFFICIAL_TECHNOLOGY_DATA_AND_WRITES_NAS_POSTGRES
      FRED_API_KEY: ${FRED_API_KEY}
    command:
      - python
      - -m
      - business_cycle.service.nas_release_aware_refresh
      - --serve
    volumes:
      - macro_source_artifacts:/var/lib/business-cycle/source-artifacts
    networks:
      - business_cycle_private
    healthcheck:
      test:
        - CMD
        - python
        - -m
        - business_cycle.service.nas_release_aware_refresh
        - --healthcheck
      interval: 60s
      timeout: 5s
      retries: 3

volumes:
  macro_postgres_data: {}
  macro_source_artifacts: {}
  cycle_state_config: {}

networks:
  business_cycle_private: {}
